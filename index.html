function ProfilePage() {
  const { navigate, isLoggedIn, currentUser, savedListings, categories, profileUserId, addToast } = useApp();

  const targetUid = profileUserId || currentUser?.uid;
  const isOwnProfile = isLoggedIn && targetUid === currentUser?.uid;

  if (!targetUid) { navigate('login'); return null; }

  const [profileUser, setProfileUser] = useState(isOwnProfile ? currentUser : null);
  const [sellerListings, setSellerListings] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      setLoading(true);
      try {
        const canSeeAllStatuses = isOwnProfile || currentUser?.role === 'ADMIN';
        const [userData, listingsData] = await Promise.all([
          fbGetUser(targetUid),
          fbGetListings(canSeeAllStatuses ? { userId: targetUid, limit: 200 } : { userId: targetUid, status: 'approved', limit: 200 })
        ]);
        if (cancelled) return;
        setProfileUser(userData);
        setSellerListings(listingsData);
      } catch(e) {
        console.error(e);
        if (!cancelled) addToast('Failed to load profile', 'error');
      }
      if (!cancelled) setLoading(false);
    })();
    return () => { cancelled = true; };
  }, [targetUid, isOwnProfile, currentUser?.role]);

  // Group listings by category, preserving category order, skipping empty ones
  const grouped = useMemo(() => {
    const byCat = {};
    sellerListings.forEach(l => {
      const key = l.category || 'uncategorized';
      if (!byCat[key]) byCat[key] = [];
      byCat[key].push(l);
    });
    return categories
      .map(c => ({ cat: c, items: byCat[c.id] || [] }))
      .filter(g => g.items.length > 0);
  }, [sellerListings, categories]);

  const approvedCount = sellerListings.filter(l => l.status === 'approved').length;
  const displayName = profileUser?.username || profileUser?.name || 'User';
  const memberSince = profileUser?.createdAt?.seconds
    ? new Date(profileUser.createdAt.seconds * 1000).toLocaleDateString(undefined, { month: 'long', year: 'numeric' })
    : null;

  // ListingCard itself now decides who can delete (owner or admin) and performs
  // the delete. We just need to prune our local sellerListings/grouped state
  // once it's gone so the grid updates without a full reload.
  const handleListingDeleted = (listingId) => {
    setSellerListings(prev => prev.filter(l => l.id !== listingId));
  };

  return (
    <div className="max-w-4xl mx-auto px-4 sm:px-6 py-8 animate-fadeIn">
      {/* Profile Header */}
      <div className="bg-surface-0 dark:bg-ink-1 rounded-2xl border border-ink-0/5 dark:border-surface-1/5 overflow-hidden mb-8">
        <div className="h-32 bg-gradient-to-r from-brand-500 to-brand-700 relative">
          <div className="absolute inset-0 hero-mesh opacity-50" />
        </div>
        <div className="px-6 pb-6 -mt-12 relative">
          <img src={profileUser?.avatar || `https://i.pravatar.cc/120?u=${targetUid}`} alt="Profile" className="w-24 h-24 rounded-2xl border-4 border-surface-0 dark:border-ink-1 object-cover shadow-lg" />
          <div className="flex flex-col sm:flex-row sm:items-end justify-between gap-4 mt-4">
            <div>
              <div className="flex items-center gap-2">
                <h1 className="font-display text-2xl font-bold text-ink-0 dark:text-surface-1">{displayName}</h1>
                {profileUser?.role === 'ADMIN' && <Icons.Verified />}
              </div>
              <p className="text-ink-4 dark:text-surface-4 text-sm mt-0.5">{memberSince ? `Member since ${memberSince}` : 'Marketplace member'}</p>
              <div className="flex items-center gap-4 mt-2 text-sm">
                <span>{approvedCount} listing{approvedCount === 1 ? '' : 's'}</span>
                {isOwnProfile && <span>{savedListings.length} saved</span>}
              </div>
            </div>
            {isOwnProfile && (
              <button onClick={() => navigate('settings')} className="px-4 py-2 rounded-xl border border-ink-0/10 dark:border-surface-1/10 text-sm font-medium hover:border-brand-300 dark:hover:border-brand-700 transition-colors">Edit Profile</button>
            )}
          </div>
        </div>
      </div>

      {/* Listings grouped by category */}
      {loading ? (
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
          {[...Array(4)].map((_, i) => <SkeletonCard key={i} />)}
        </div>
      ) : grouped.length === 0 ? (
        <div className="text-center py-16 text-ink-4 dark:text-surface-4">
          <div className="text-4xl mb-3">📦</div>
          <p className="font-medium">{isOwnProfile ? "You haven't posted anything yet" : "No listings yet"}</p>
          {isOwnProfile && <button onClick={() => navigate('create')} className="mt-4 px-5 py-2.5 bg-brand-500 text-white text-sm font-semibold rounded-xl hover:bg-brand-600 transition-colors">Post your first listing</button>}
        </div>
      ) : (
        <div className="space-y-10">
          {grouped.map(({ cat, items }) => (
            <div key={cat.id}>
              <div className="flex items-center gap-2 mb-4">
                <span className="text-xl">{cat.icon}</span>
                <h2 className="font-display text-xl font-bold text-ink-0 dark:text-surface-1">{cat.name}</h2>
                <span className="text-sm text-ink-4 dark:text-surface-4">({items.length})</span>
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                {items.map((l, i) => (
                  <div key={l.id} className="relative">
                    {isOwnProfile && l.status !== 'approved' && (
                      <span className={`absolute top-2 left-2 z-10 text-[10px] font-semibold px-2 py-0.5 rounded-full capitalize ${
                        l.status === 'rejected' ? 'bg-red-500 text-white' : 'bg-yellow-500 text-white'
                      }`}>{l.status}</span>
                    )}
                    <ListingCard listing={l} index={i} onDeleted={handleListingDeleted} />
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// Uses Google Gemini API with embedded key - works for everyone instantly

const GEMINI_API_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent';
const GEMINI_API_KEY = 'AQ.Ab8RN6IZYV_CDecQ89vpxzbYRZ2TXqp_dq0dK6Ii2eA1rDP2Hg';
const CHAT_HISTORY_STORAGE = 'mh_chat_history';

const SYSTEM_PROMPT = `You are a helpful, friendly AI assistant embedded in MarketHub, a premium marketplace. You can answer ANY question — science, math, coding, writing, recipes, travel, life advice, explanations, translations, brainstorming, and more. Keep responses concise and well-formatted (use line breaks for readability). If the user asks about the marketplace itself, mention that MarketHub is a buy/sell/services platform with listings, categories, seller dashboards, and messaging between users.`;

function getStoredChatHistory() {
  try {
    return JSON.parse(localStorage.getItem(CHAT_HISTORY_STORAGE) || '[]');
  } catch { return []; }
}

function saveChatHistory(history) {
  // Keep last 20 messages to avoid localStorage limits
  const trimmed = history.slice(-20);
  localStorage.setItem(CHAT_HISTORY_STORAGE, JSON.stringify(trimmed));
}

async function callGeminiAPI(conversationHistory) {
  // Build contents array from conversation history (last N messages)
  const contents = conversationHistory
    .filter(m => m.role === 'user' || m.role === 'bot')
    .slice(-16) // keep recent context manageable
    .map(m => ({
      role: m.role === 'bot' ? 'model' : 'user',
      parts: [{ text: m.text }]
    }));

  if (contents.length === 0) return 'No message to send.';

  const body = {
    system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
    contents,
    generationConfig: {
      temperature: 0.8,
      maxOutputTokens: 1024,
    }
  };

  const res = await fetch(`${GEMINI_API_URL}?key=${GEMINI_API_KEY}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  if (!res.ok) {
    const errData = await res.json().catch(() => ({}));
    const errMsg = errData?.error?.message || `API error ${res.status}`;
    
    // Check for auth errors specifically
    if (res.status === 401 || res.status === 403 || errMsg.toLowerCase().includes('authentication')) {
      throw new Error('The AI service is not properly configured. Please contact the site administrator or try again later.');
    }
    
    // Check for quota/rate limit errors
    if (res.status === 429 || errMsg.toLowerCase().includes('quota') || errMsg.toLowerCase().includes('limit')) {
      throw new Error('The AI service is temporarily unavailable due to high traffic. Please try again in a moment.');
    }
    
    throw new Error(errMsg || 'Something went wrong. Please try again.');
  }

  const data = await res.json();
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!text) throw new Error('No response from AI. Try again.');
  return text;
}

// Simple markdown-like formatting for bold, italic, code blocks, lists
function formatBotText(text) {
  return text
    .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre class="chatbot-code-block"><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code class="chatbot-inline-code">$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^[-•] (.+)$/gm, '<span class="chatbot-list-item">• $1</span>')
    .replace(/^\d+\. (.+)$/gm, (match, p1) => `<span class="chatbot-list-item">${match.match(/^\d+/)[0]}. ${p1}</span>`)
    .replace(/\n\n/g, '<br/><br/>')
    .replace(/\n/g, '<br/>');
}

function ChatBot() {
  const { navigate, t } = useApp();
  const [isOpen, setIsOpen] = useState(false);
  const [messages, setMessages] = useState(() => {
    const stored = getStoredChatHistory();
    return stored.length > 0 ? stored : [
      { id: 1, role: 'bot', text: "Hi! I'm your AI assistant. Ask me anything — science, coding, recipes, travel tips, life advice, or help with MarketHub. What's on your mind?" }
    ];
  });
  const [input, setInput] = useState('');
  const [isTyping, setIsTyping] = useState(false);
  const [error, setError] = useState('');
  const scrollRef = useRef(null);
  const inputRef = useRef(null);

  // Persist messages
  useEffect(() => {
    const botAndUser = messages.filter(m => m.role === 'user' || m.role === 'bot');
    saveChatHistory(botAndUser);
  }, [messages]);

  // Auto-scroll
  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages, isTyping]);

  useEffect(() => {
    if (isOpen) {
      setTimeout(() => inputRef.current?.focus(), 100);
    }
  }, [isOpen]);

  const handleClearChat = () => {
    setMessages([{ id: Date.now(), role: 'bot', text: "Chat cleared! Ask me anything." }]);
    localStorage.removeItem(CHAT_HISTORY_STORAGE);
  };

  const handleSend = async () => {
    const text = input.trim();
    if (!text || isTyping) return;

    const userMsg = { id: Date.now(), role: 'user', text };
    setMessages(prev => [...prev, userMsg]);
    setInput('');
    setError('');
    setIsTyping(true);

    try {
      const history = [...messages.filter(m => m.role === 'user' || m.role === 'bot'), userMsg];
      const reply = await callGeminiAPI(history);
      setMessages(prev => [...prev, { id: Date.now(), role: 'bot', text: reply, formatted: true }]);
    } catch (err) {
      setError(err.message || 'Something went wrong. Please try again.');
    } finally {
      setIsTyping(false);
    }
  };

  const handleKeyDown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
  };

  const quickPrompts = [
    { label: '💡 Explain something', query: 'Explain quantum computing like I\'m 10' },
    { label: '✍️ Help me write', query: 'Help me write a professional email to my boss asking for a raise' },
    { label: '🍳 Recipe ideas', query: 'Give me a quick dinner recipe with chicken and pasta' },
    { label: '🛍️ About this site', query: 'What is MarketHub and how do I use it?' },
  ];

  const showQuickActions = messages.filter(m => m.role === 'user').length === 0;

  const handleQuickPrompt = (query) => {
    if (isTyping) return;
    setInput(query);
    setTimeout(() => {
      const userMsg = { id: Date.now(), role: 'user', text: query };
      setMessages(prev => [...prev, userMsg]);
      setInput('');
      setError('');
      setIsTyping(true);
      const history = [...messages.filter(m => m.role === 'user' || m.role === 'bot'), userMsg];
      callGeminiAPI(history)
        .then(reply => setMessages(prev => [...prev, { id: Date.now(), role: 'bot', text: reply, formatted: true }]))
        .catch(err => setError(err.message))
        .finally(() => setIsTyping(false));
    }, 50);
  };

  return (
    <>
      {/* FAB Button */}
      {!isOpen && (
        <button
          onClick={() => setIsOpen(true)}
          aria-label="Open AI chat assistant"
          className="chatbot-fab fixed bottom-6 left-6 z-50 w-14 h-14 rounded-full bg-gradient-to-br from-brand-500 to-brand-600 text-white flex items-center justify-center shadow-2xl shadow-brand-500/30 hover:from-brand-600 hover:to-brand-700 hover:scale-105 transition-all duration-200"
        >
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </button>
      )}

      {/* Chat Window */}
      {isOpen && (
        <div className="chatbot-window fixed bottom-6 left-6 z-50 w-[380px] max-w-[calc(100vw-48px)] h-[560px] max-h-[calc(100vh-48px)] rounded-2xl shadow-2xl flex flex-col overflow-hidden bg-surface-0 dark:bg-ink-1 border border-ink-0/10 dark:border-surface-1/10">
          {/* Header */}
          <div className="flex items-center justify-between px-5 py-4 bg-gradient-to-r from-brand-500 to-brand-600 text-white flex-shrink-0">
            <div className="flex items-center gap-3">
              <div className="w-9 h-9 rounded-full bg-white/20 flex items-center justify-center">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M12 2a4 4 0 0 1 4 4v2a4 4 0 0 1-8 0V6a4 4 0 0 1 4-4z"/>
                  <path d="M16 14H8a4 4 0 0 0-4 4v2h16v-2a4 4 0 0 0-4-4z"/>
                  <circle cx="12" cy="6" r="1.5" fill="currentColor" stroke="none"/>
                </svg>
              </div>
              <div>
                <p className="font-semibold text-sm">AI Assistant</p>
                <div className="flex items-center gap-1.5">
                  <span className="w-2 h-2 rounded-full bg-green-300"></span>
                  <span className="text-xs opacity-80">Powered by Gemini</span>
                </div>
              </div>
            </div>
            <div className="flex items-center gap-1">
              <button
                onClick={handleClearChat}
                aria-label="Clear chat"
                title="Clear conversation"
                className="w-8 h-8 rounded-lg flex items-center justify-center hover:bg-white/20 transition-colors"
              >
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              </button>
              <button
                onClick={() => setIsOpen(false)}
                aria-label="Close chat"
                className="w-8 h-8 rounded-lg flex items-center justify-center hover:bg-white/20 transition-colors"
              >
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
              </button>
            </div>
          </div>

          {/* Messages Area */}
          <div ref={scrollRef} className="chatbot-scrollbar flex-1 overflow-y-auto px-4 py-4 space-y-3">
            {messages.map((msg) => (
              <div
                key={msg.id}
                className={`chatbot-msg-in flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}
              >
                {msg.role !== 'user' && (
                  <div className="w-7 h-7 rounded-full bg-gradient-to-br from-brand-400 to-brand-600 flex items-center justify-center flex-shrink-0 mr-2 mt-0.5">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round"><path d="M12 2a4 4 0 0 1 4 4v2a4 4 0 0 1-8 0V6a4 4 0 0 1 4-4z"/><path d="M16 14H8a4 4 0 0 0-4 4v2h16v-2a4 4 0 0 0-4-4z"/></svg>
                  </div>
                )}
                <div className={`max-w-[80%] px-4 py-2.5 text-[13px] leading-relaxed ${
                  msg.role === 'user'
                    ? 'chat-bubble-sent bg-gradient-to-r from-brand-500 to-brand-600 text-white'
                    : 'chat-bubble-received bg-surface-2 dark:bg-ink-2 text-ink-1 dark:text-surface-2'
                }`}>
                  {msg.formatted
                    ? <span dangerouslySetInnerHTML={{ __html: formatBotText(msg.text) }} />
                    : msg.text
                  }
                </div>
              </div>
            ))}

            {/* Error message */}
            {error && (
              <div className="chatbot-msg-in flex justify-start">
                <div className="max-w-[80%] px-4 py-2.5 text-[13px] bg-red-50 dark:bg-red-950/30 border border-red-200 dark:border-red-800/40 text-red-600 dark:text-red-400 rounded-2xl">
                  {error}
                </div>
              </div>
            )}

            {/* Typing indicator */}
            {isTyping && (
              <div className="chatbot-msg-in flex justify-start">
                <div className="w-7 h-7 rounded-full bg-gradient-to-br from-brand-400 to-brand-600 flex items-center justify-center flex-shrink-0 mr-2 mt-0.5">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round"><path d="M12 2a4 4 0 0 1 4 4v2a4 4 0 0 1-8 0V6a4 4 0 0 1 4-4z"/></svg>
                </div>
                <div className="chat-bubble-received bg-surface-2 dark:bg-ink-2 px-4 py-3 flex items-center gap-1.5">
                  <span className="chatbot-dot-1 w-2 h-2 rounded-full bg-ink-4 dark:bg-surface-4"></span>
                  <span className="chatbot-dot-2 w-2 h-2 rounded-full bg-ink-4 dark:bg-surface-4"></span>
                  <span className="chatbot-dot-3 w-2 h-2 rounded-full bg-ink-4 dark:bg-surface-4"></span>
                </div>
              </div>
            )}
          </div>

          {/* Quick Prompts */}
          {showQuickActions && (
            <div className="px-4 pb-2 flex-shrink-0">
              <div className="flex flex-wrap gap-1.5">
                {quickPrompts.map((qp) => (
                  <button
                    key={qp.label}
                    onClick={() => handleQuickPrompt(qp.query)}
                    disabled={isTyping}
                    className="px-3 py-1.5 text-[11px] font-medium rounded-full bg-brand-50 dark:bg-brand-950/30 text-brand-600 dark:text-brand-400 border border-brand-200 dark:border-brand-800/30 hover:bg-brand-100 dark:hover:bg-brand-950/50 transition-colors disabled:opacity-50"
                  >
                    {qp.label}
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* Input Area */}
          <div className="flex-shrink-0 px-4 pb-4 pt-2 border-t border-ink-0/5 dark:border-surface-1/10">
            <div className="flex items-center gap-2">
              <textarea
                ref={inputRef}
                value={input}
                onChange={(e) => setInput(e.target.value)}
                onKeyDown={handleKeyDown}
                placeholder="Ask me anything..."
                rows={1}
                className="flex-1 px-4 py-2.5 bg-surface-1 dark:bg-ink-2 rounded-xl border border-ink-0/10 dark:border-surface-1/10 text-sm text-ink-0 dark:text-surface-1 placeholder:text-ink-5 dark:placeholder:text-surface-4 outline-none focus:border-brand-400 transition-colors resize-none"
                style={{ minHeight: '38px', maxHeight: '80px' }}
              />
              <button
                onClick={handleSend}
                disabled={!input.trim() || isTyping}
                aria-label="Send message"
                className="w-10 h-10 rounded-xl bg-gradient-to-r from-brand-500 to-brand-600 text-white flex items-center justify-center hover:from-brand-600 hover:to-brand-700 transition-all disabled:opacity-40 disabled:cursor-not-allowed flex-shrink-0"
              >
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
              </button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}
