// Auth helpers
async function fbSignUp(email, password, displayName) {
  const cred = await fbAuth.createUserWithEmailAndPassword(email, password);
  await cred.user.updateProfile({ displayName });
  await fbDb.collection('users').doc(cred.user.uid).set({
    uid: cred.user.uid, username: displayName, email, avatar: '', role: 'USER',
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });
  return cred.user;
}

async function fbLogin(email, password) {
  const cred = await fbAuth.signInWithEmailAndPassword(email, password);
  return cred.user;
}

async function fbLogout() { await fbAuth.signOut(); }

async function fbGetUser(uid) {
  const doc = await fbDb.collection('users').doc(uid).get();
  return doc.exists ? doc.data() : null;
}

async function fbUpdateUser(uid, data) {
  await fbDb.collection('users').doc(uid).update(data);
}

  const formData = new FormData();
  formData.append('file', file);

    method: 'POST',
    body: formData

    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || 'Image upload failed');

// Real-time listener for a listings query. Fires immediately with the current
// results, then again whenever any matching listing is added, edited, deleted,
// or changes status (e.g. approved/rejected/deleted from the admin panel) —
// so every open tab/browser stays in sync with no page refresh needed.
function fbListenListings(filters = {}, callback) {
  let q = fbDb.collection('listings').orderBy('createdAt', 'desc');
  if (filters.category) q = q.where('category', '==', filters.category);
  if (filters.userId) q = q.where('userId', '==', filters.userId);
  if (filters.status) q = q.where('status', '==', filters.status);
  q = q.limit(filters.limit || 50);
  return q.onSnapshot(
    snap => callback(snap.docs.map(d => ({ id: d.id, ...d.data() }))),
    err => console.error('[fbListenListings] error', err)
  );
}

// Favorites
async function fbToggleFavorite(userId, listingId) {
  const favId = `${userId}_${listingId}`;
  const ref = fbDb.collection('favorites').doc(favId);
  const doc = await ref.get();
  const nowFavorited = !doc.exists;

  // The actual favorite/unfavorite is the part that must succeed — do it first,
  // on its own document, so it isn't blocked by rules on a document (the listing)
  // that belongs to someone else.
  if (doc.exists) {
    await ref.delete();
  } else {
    await ref.set({ userId, listingId, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
  }

  // Best-effort: keep the denormalized "favorites" counter on the listing in sync.
  // Many Firestore rule setups only let the listing's OWNER update it, which would
  // make this call throw for every other user. Treat it as non-critical so a rules
  // restriction here can't undo the favorite itself.
  try {
    await fbDb.collection('listings').doc(listingId).update({
      favorites: firebase.firestore.FieldValue.increment(nowFavorited ? 1 : -1)
    });
  } catch (e) {
    console.warn('[favorites] Saved the favorite, but could not update the listing\'s favorites counter (likely a Firestore rules restriction):', e.message);
  }

  return nowFavorited;
}

// Messages
async function fbSendMessage(fromUid, toUid, fromName, text, listingId) {
  const convId = [fromUid, toUid].sort().join('_');
  const msgRef = await fbDb.collection('conversations').doc(convId)
    .collection('messages').add({
      from: fromUid, fromName, text, listingId: listingId || null,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  await fbDb.collection('conversations').doc(convId).set({
    participants: [fromUid, toUid],
    lastMessage: text, lastMessageAt: firebase.firestore.FieldValue.serverTimestamp(),
    participantsNames: { [fromUid]: fromName }
  }, { merge: true });
  return msgRef.id;
}

async function fbGetConversations(uid) {
  const snap = await fbDb.collection('conversations')
    .where('participants', 'array-contains', uid)
    .limit(20).get();
  const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  return docs.sort((a, b) => {
    const aTime = a.lastMessageAt?.toMillis?.() || 0;
    const bTime = b.lastMessageAt?.toMillis?.() || 0;
    return bTime - aTime;
  });
}

async function fbGetMessages(convId) {
  const snap = await fbDb.collection('conversations').doc(convId)
    .collection('messages').orderBy('createdAt', 'asc').limit(100).get();
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

// Real-time listener for messages in a conversation. Calls `callback` immediately
// with the current messages, then again every time messages are added/changed.
// Returns an unsubscribe function — call it when the chat is closed/unmounted.
function fbListenMessages(convId, callback) {
  return fbDb.collection('conversations').doc(convId)
    .collection('messages').orderBy('createdAt', 'asc').limit(100)
    .onSnapshot(snap => {
      const msgs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      callback(msgs);
    }, err => console.error('[fbListenMessages] error', err));
}

async function fbDeleteCategory(docId, categoryId) {
  // Refuse to delete a category that listings still reference — otherwise
  // those listings are left pointing at a category id that no longer
  // exists (broken filters, "Uncategorized" showing up unexpectedly, etc).
  // This is a client-side guard for UX only; Firestore security rules should
  // enforce the same check server-side since this can be bypassed by anyone
  // calling the API directly.
  const inUse = await fbDb.collection('listings').where('category', '==', categoryId).limit(1).get();
  if (!inUse.empty) {
    const err = new Error('This category still has listings assigned to it. Move or delete those listings first.');
    err.code = 'CATEGORY_IN_USE';
    throw err;
  }
  await fbDb.collection('categories').doc(docId).delete();
}

        <div className="bg-surface-0 dark:bg-ink-1 rounded-2xl border border-ink-0/5 dark:border-surface-1/5 p-6">

            <p><strong>4.</strong> Add a Web app and copy the config object</p>
            <p><strong>5.</strong> Enable Authentication &gt; Email/Password sign-in</p>
            <p><strong>6.</strong> Create a Firestore Database (start in test mode)</p>

const AppContext = createContext();

function AppProvider({ children }) {
  const [theme, setTheme] = useState(() => localStorage.getItem('mh-theme') || 'light');
  const [lang, setLang] = useState(() => localStorage.getItem('mh-lang') || 'en');
  const isRTL = lang === 'ar';

  useEffect(() => {
    localStorage.setItem('mh-lang', lang);
    document.documentElement.lang = lang;
    document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  }, [lang]);

  const t = useCallback((key) => (TRANSLATIONS[lang] && TRANSLATIONS[lang][key]) || TRANSLATIONS.en[key] || key, [lang]);

  const [currentPage, setCurrentPage] = useState('home');
  const [selectedCategory, setSelectedCategory] = useState(null);
  const [initialSort, setInitialSort] = useState(null);
  const [initialFeaturedOnly, setInitialFeaturedOnly] = useState(false);
  const [selectedListing, setSelectedListing] = useState(null);
  const [profileUserId, setProfileUserId] = useState(null);
  const [searchQuery, setSearchQuery] = useState('');
  const [toasts, setToasts] = useState([]);
  const [savedListings, setSavedListings] = useState([]);
  const [isLoggedIn, setIsLoggedIn] = useState(false);
  const [currentUser, setCurrentUser] = useState(null);
  const [fbReady, setFbReady] = useState(false);
  const [categories, setCategories] = useState([]);
  const [listings, setListings] = useState([]);
  const [listingsLoading, setListingsLoading] = useState(false);
  const [messages, setMessages] = useState([]);
  const [chatMessages, setChatMessages] = useState([]);
  const [activeConvId, setActiveConvId] = useState(null);

  // Apply theme on mount
  useEffect(() => {
    document.documentElement.classList.toggle('dark', theme === 'dark');
  }, []);

  // Initialize Firebase from stored config
  useEffect(() => {
    const cfg = getStoredConfig();
    if (cfg) {
      try { initFirebase(cfg); setFbReady(true); } catch(e) { console.error('Firebase init failed', e); setFbReady(false); }
    }
  }, []);

  // Auth state listener
  useEffect(() => {
    if (!isFirebaseReady()) return;
    const unsub = fbAuth.onAuthStateChanged(async (user) => {
      if (user) {
        setIsLoggedIn(true);
        const userData = await fbGetUser(user.uid);
        setCurrentUser({
          uid: user.uid,
          name: user.displayName || userData?.username || 'User',
          email: user.email,
          avatar: userData?.avatar || `https://i.pravatar.cc/80?u=${user.uid}`,
          role: userData?.role || 'USER'
        });
        // Load saved listings
        const favs = await fbGetFavorites(user.uid);
        setSavedListings(favs);
        // Load conversations
        const convs = await fbGetConversations(user.uid);
        setMessages(convs.map(c => ({
          id: c.id, from: c.participants.find(p => p !== user.uid) || 'unknown',
          avatar: `https://i.pravatar.cc/40?u=${c.participants.find(p => p !== user.uid)}`,
          lastMessage: c.lastMessage, time: c.lastMessageAt?.toDate?.()?.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) || 'Recently',
          unread: 0, online: false
        })));
      } else {
        setIsLoggedIn(false);
        setCurrentUser(null);
        setSavedListings([]);
      }
    });
    return () => unsub();
  }, [fbReady]);

  // Load all PUBLIC (approved) listings from Firestore — live, so a listing
  // that gets deleted, edited, approved, or rejected disappears/updates on
  // every open tab instantly, with no page refresh needed.
  const reloadListings = useCallback(async () => {
    if (!isFirebaseReady()) return;
    setListingsLoading(true);
    try {
      const data = await fbGetListings({ status: 'approved' });
      setListings(data);
    } catch(e) { console.error('Failed to load listings', e); }
    setListingsLoading(false);
  }, []);

  useEffect(() => {
    if (!fbReady || !isFirebaseReady()) return;
    setListingsLoading(true);
    const unsubscribe = fbListenListings({ status: 'approved' }, data => {
      setListings(data);
      setListingsLoading(false);
    });
    return () => unsubscribe();
  }, [fbReady]);

  // Load the current seller's own listings, any status (for Seller Dashboard) — live
  const [myListings, setMyListings] = useState([]);
  const reloadMyListings = useCallback(async () => {
    if (!isFirebaseReady() || !currentUser?.uid) { setMyListings([]); return; }
    try {
      const data = await fbGetListings({ userId: currentUser.uid });
      setMyListings(data);
    } catch(e) { console.error('Failed to load my listings', e); }
  }, [currentUser?.uid]);

  useEffect(() => {
    if (!fbReady || !isFirebaseReady() || !currentUser?.uid) { setMyListings([]); return; }
    const unsubscribe = fbListenListings({ userId: currentUser.uid }, data => setMyListings(data));
    return () => unsubscribe();
  }, [fbReady, currentUser?.uid]);

  // Load ALL listings for admin moderation queue (admin-only read per security rules) — live
  const [pendingListings, setPendingListings] = useState([]);
  const reloadPendingListings = useCallback(async () => {
    if (!isFirebaseReady() || currentUser?.role !== 'ADMIN') { setPendingListings([]); return; }
    try {
      const data = await fbGetListings({ status: 'pending', limit: 100 });
      setPendingListings(data);
    } catch(e) { console.error('Failed to load pending listings', e); }
  }, [currentUser?.role]);

  useEffect(() => {
    if (!fbReady || !isFirebaseReady() || currentUser?.role !== 'ADMIN') { setPendingListings([]); return; }
    const unsubscribe = fbListenListings({ status: 'pending', limit: 100 }, data => setPendingListings(data));
    return () => unsubscribe();
  }, [fbReady, currentUser?.role]);

  useEffect(() => {
    if (!fbReady || !isFirebaseReady()) return;
    const unsubscribe = fbListenCategories(cats => setCategories(cats));
    return () => unsubscribe();
  }, [fbReady]);

  const reloadCategories = useCallback(async () => {
    if (!isFirebaseReady()) return;
    try {
      const cats = await fbGetCategories();
      setCategories(cats);
    } catch(e) { console.error('Failed to load categories', e); }
  }, []);

  const [siteSettings, setSiteSettings] = useState({});
  const reloadSiteSettings = useCallback(async () => {
    if (!isFirebaseReady()) return;
    try {
      const s = await fbGetSiteSettings();
      setSiteSettings(s || {});
    } catch(e) { console.error('Failed to load site settings', e); }
  }, []);

  useEffect(() => {
    if (!fbReady || !isFirebaseReady()) return;
    // onSnapshot pushes the current value immediately, then again on every
    // change (from this tab, the admin panel, or any other open tab) —
    // this is what makes site settings update live with no refresh.
    const unsubscribe = fbListenSiteSettings(s => setSiteSettings(s || {}));
    return () => unsubscribe();
  }, [fbReady]);

  const toggleTheme = () => {
    setTheme(t => {
      const next = t === 'light' ? 'dark' : 'light';
      document.documentElement.classList.toggle('dark', next === 'dark');
      localStorage.setItem('mh-theme', next);
      return next;
    });
  };

  const addToast = useCallback((message, type = 'success') => {
    const id = Date.now();
    setToasts(prev => [...prev, { id, message, type }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3500);
  }, []);

  // Called after a listing is deleted (from ListingCard, anywhere in the app)
  // so every context-derived list — home/browse/search feeds, my listings,
  // and the admin moderation queue — drops it immediately instead of waiting
  // on the next refetch.
  const removeListingLocally = useCallback((listingId) => {
    setListings(prev => prev.filter(l => l.id !== listingId));
    setMyListings(prev => prev.filter(l => l.id !== listingId));
    setPendingListings(prev => prev.filter(l => l.id !== listingId));
  }, []);

  const toggleSave = useCallback(async (listingId) => {
    if (!isFirebaseReady() || !currentUser?.uid) { addToast('Please log in to save listings', 'error'); return; }
    try {
      const saved = await fbToggleFavorite(currentUser.uid, String(listingId));
      setSavedListings(prev => saved ? [...prev, listingId] : prev.filter(id => id !== listingId));
      addToast(saved ? 'Saved to your listings' : 'Removed from saved listings');
    } catch(e) {
      console.error('[favorites] toggle failed:', e.code || '', e.message || e);
      addToast(e.code === 'permission-denied' ? 'Favorites are blocked by Firestore rules — see console' : 'Failed to update favorites', 'error');
    }
  }, [currentUser, addToast]);

  const navigate = useCallback((page, data = {}) => {
    setCurrentPage(page);
    if (data.category) setSelectedCategory(data.category);
    if (data.sort) setInitialSort(data.sort);
    if (data.featuredOnly) setInitialFeaturedOnly(true);
    if (page === 'profile') setProfileUserId(data.userId || null);
    if (data.listing) {
      setSelectedListing(data.listing);
      if (isFirebaseReady() && data.listing.id) fbIncrementViews(data.listing.id).catch(()=>{});
    }
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, []);

  const handleLogout = useCallback(async () => {
    if (isFirebaseReady()) await fbLogout();

  return (

      handleLogout, fbReady, categories, reloadCategories,

}

function timeAgoFromTimestamp(ts) {
  if (!ts?.seconds) return null;
  const diffMs = Date.now() - ts.seconds * 1000;
  const mins = Math.floor(diffMs / 60000);
  if (mins < 1) return 'Just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  if (days < 30) return `${days}d ago`;
  const months = Math.floor(days / 30);
  if (months < 12) return `${months}mo ago`;
  return new Date(ts.seconds * 1000).toLocaleDateString();
}

function ListingCard({ listing, index = 0, onDeleted }) {
  const { navigate, savedListings, toggleSave, currentUser, addToast, removeListingLocally } = useApp();
  const isSaved = savedListings.includes(listing.id) || savedListings.includes(String(listing.id));
  const sellerName = listing.seller || listing.sellerName || 'Unknown';
  const img = listing.image || 'https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?w=600&h=400&fit=crop';
  const [isDeleted, setIsDeleted] = useState(false);
  const [deleting, setDeleting] = useState(false);

  // Delete permission lives here so every page that renders a ListingCard
  // (home, browse, search, saved, profile, admin) gets it for free — no
  // per-page wiring needed. Firestore rules enforce this server-side too,
  // this is just the UI gate.
  const canDelete = !!currentUser && (currentUser.uid === listing.userId || currentUser.role === 'ADMIN');

  const handleDelete = async (e) => {
    e.stopPropagation();
    if (deleting) return;
    if (!confirm(`Delete "${listing.title}"? This can't be undone.`)) return;
    setDeleting(true);
    try {
      await fbDeleteListing(listing.id);
      setIsDeleted(true);
      addToast('Listing deleted');
      removeListingLocally(listing.id); // keeps home/browse/search/saved/my-listings/admin-queue in sync
      onDeleted?.(listing.id); // optional: lets parents with their own local list (e.g. Profile) prune it immediately
    } catch (e) {
      console.error(e);
      addToast('Failed to delete listing', 'error');
      setDeleting(false);
    }
  };

  if (isDeleted) return null;

  return (
    <div className={`animate-fadeInUp delay-${(index % 4) + 1} group cursor-pointer`} onClick={() => navigate('listing', { listing })}>

        <div className="p-4">
          <h3 className="font-semibold text-[15px] leading-snug text-ink-0 dark:text-surface-1 line-clamp-2 mb-2 group-hover:text-brand-600 dark:group-hover:text-brand-400 transition-colors">{listing.title}</h3>

            <Icons.MapPin /> <span>{listing.location || 'Unknown'}</span>

          <div className="flex items-center justify-between">
            <div className="flex items-center gap-2">
              <span
                onClick={(e) => { e.stopPropagation(); listing.userId && navigate('profile', { userId: listing.userId }); }}

              >{sellerName}</span>
              {listing.verified && <Icons.Verified />}

              <div className="flex items-center gap-1 text-sm">

        </div>
      </div>
    </div>
  );

// ==================== BROWSE PAGE ====================
function BrowsePage() {
  const { navigate, selectedCategory, setSelectedCategory, searchQuery, setSearchQuery, listings, categories, initialSort, setInitialSort, initialFeaturedOnly, setInitialFeaturedOnly, t } = useApp();
  const [priceRange, setPriceRange] = useState([0, 100000]);
  const [sortBy, setSortBy] = useState('newest');
  const [featuredOnly, setFeaturedOnly] = useState(false);
  const [viewMode, setViewMode] = useState('grid');
  const [filtersOpen, setFiltersOpen] = useState(false);

  useEffect(() => {
    if (initialSort) { setSortBy(initialSort); setInitialSort(null); }
    if (initialFeaturedOnly) { setFeaturedOnly(true); setInitialFeaturedOnly(false); }
  }, [initialSort, initialFeaturedOnly]);

  const allListings = listings.length > 0 ? listings : LISTINGS;

  const filtered = useMemo(() => {
    let list = [...allListings];
    if (selectedCategory) list = list.filter(l => l.category === selectedCategory);
    if (featuredOnly) list = list.filter(l => l.featured);
    if (searchQuery) list = list.filter(l => (l.title||'').toLowerCase().includes(searchQuery.toLowerCase()) || (l.seller||l.sellerName||'').toLowerCase().includes(searchQuery.toLowerCase()));
    list = list.filter(l => l.price >= priceRange[0] && l.price <= priceRange[1]);
    if (sortBy === 'price-low') list.sort((a, b) => a.price - b.price);
    else if (sortBy === 'price-high') list.sort((a, b) => b.price - a.price);
    else if (sortBy === 'popular') list.sort((a, b) => b.views - a.views);
    return list;
  }, [selectedCategory, featuredOnly, searchQuery, priceRange, sortBy, allListings]);

  const activeCategory = categories.find(c => c.id === selectedCategory);

  return (
    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      {/* Breadcrumb */}
      <div className="flex items-center gap-2 text-sm text-ink-4 dark:text-surface-4 mb-6 animate-fadeIn">
        <button onClick={() => { setSelectedCategory(null); navigate('home'); }} className="hover:text-brand-500 transition-colors">{t('nav_home')}</button>
        <Icons.ChevronRight className="rtl-flip" />
        <span className="text-ink-1 dark:text-surface-2 font-medium">{activeCategory ? activeCategory.name : searchQuery ? `Search: "${searchQuery}"` : t('footer_categories')}</span>
      </div>

      {/* Header */}
      <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8 animate-fadeInUp">
        <div>
          <h1 className="font-display text-3xl sm:text-4xl font-bold text-ink-0 dark:text-surface-1">
            {activeCategory ? activeCategory.name : searchQuery ? 'Search Results' : featuredOnly ? t('footer_featured') : sortBy === 'popular' ? t('browse_trending') : t('browse_title')}
          </h1>
          <p className="text-ink-4 dark:text-surface-4 mt-1">
            {filtered.length} listings found
            {featuredOnly && (
              <button onClick={() => setFeaturedOnly(false)} className="ml-2 inline-flex items-center gap-1 text-xs px-2 py-0.5 rounded-full bg-brand-50 dark:bg-brand-950/30 text-brand-600 dark:text-brand-400 hover:bg-brand-100 dark:hover:bg-brand-950/50 transition-colors">
                {t('browse_featured_only')} <span aria-hidden="true">×</span>
              </button>
            )}
          </p>
        </div>
        <div className="flex items-center gap-3">
          <button onClick={() => setFiltersOpen(!filtersOpen)} className="flex items-center gap-2 px-4 py-2.5 rounded-xl border border-ink-0/10 dark:border-surface-1/10 text-sm font-medium hover:border-brand-300 dark:hover:border-brand-700 transition-colors">
            <Icons.Filter /> {t('browse_filters')}
          </button>
          <select value={sortBy} onChange={e => setSortBy(e.target.value)} className="px-4 py-2.5 rounded-xl border border-ink-0/10 dark:border-surface-1/10 bg-surface-0 dark:bg-ink-1 text-sm font-medium outline-none appearance-none cursor-pointer">
            <option value="newest">{t('browse_sort_newest')}</option>
            <option value="price-low">{t('browse_sort_price_low')}</option>
            <option value="price-high">{t('browse_sort_price_high')}</option>
            <option value="popular">{t('browse_sort_popular')}</option>
          </select>
          <div className="hidden sm:flex items-center gap-1 p-1 rounded-xl border border-ink-0/10 dark:border-surface-1/10">
            <button onClick={() => setViewMode('grid')} className={`p-2 rounded-lg ${viewMode === 'grid' ? 'bg-brand-500 text-white' : 'text-ink-4 hover:text-ink-1'}`}><Icons.Grid /></button>
            <button onClick={() => setViewMode('list')} className={`p-2 rounded-lg ${viewMode === 'list' ? 'bg-brand-500 text-white' : 'text-ink-4 hover:text-ink-1'}`}><Icons.List /></button>
          </div>
        </div>
      </div>

      <div className="flex gap-8">
        {/* Sidebar Filters */}
        <aside className={`${filtersOpen ? 'fixed inset-0 z-50 bg-surface-0 dark:bg-ink-0 p-6 overflow-y-auto' : 'hidden'} lg:relative lg:block lg:p-0 w-full lg:w-64 flex-shrink-0`}>
          {filtersOpen && (
            <button onClick={() => setFiltersOpen(false)} className="lg:hidden mb-4 flex items-center gap-2 text-sm font-medium">
              <Icons.X /> Close Filters
            </button>
          )}
          <div className="space-y-6">
            {/* Categories */}
            <div>
              <h3 className="font-semibold text-sm text-ink-0 dark:text-surface-1 mb-3">Categories</h3>
              <div className="space-y-1">
                <button onClick={() => setSelectedCategory(null)} className={`w-full text-left px-3 py-2 rounded-lg text-sm transition-colors ${!selectedCategory ? 'bg-brand-50 dark:bg-brand-950/30 text-brand-600 dark:text-brand-400 font-semibold' : 'text-ink-3 dark:text-surface-3 hover:bg-ink-0/5 dark:hover:bg-surface-1/5'}`}>
                  All Categories
                </button>
                {categories.map(cat => (
                  <button key={cat.id} onClick={() => setSelectedCategory(cat.id)} className={`w-full text-left px-3 py-2 rounded-lg text-sm transition-colors flex items-center gap-2 ${selectedCategory === cat.id ? 'bg-brand-50 dark:bg-brand-950/30 text-brand-600 dark:text-brand-400 font-semibold' : 'text-ink-3 dark:text-surface-3 hover:bg-ink-0/5 dark:hover:bg-surface-1/5'}`}>
                    <span className="text-base">{cat.icon}</span>
                    <span className="flex-1">{cat.name}</span>
                  </button>
                ))}
              </div>
            </div>

            {/* Price Range */}
            <div>
              <h3 className="font-semibold text-sm text-ink-0 dark:text-surface-1 mb-3">Price Range</h3>
              <div className="flex gap-2">
                <input type="number" placeholder="Min" value={priceRange[0] || ''} onChange={e => setPriceRange([Number(e.target.value), priceRange[1]])} className="flex-1 px-3 py-2 rounded-lg border border-ink-0/10 dark:border-surface-1/10 bg-surface-0 dark:bg-ink-1 text-sm outline-none focus:border-brand-400" />
                <input type="number" placeholder="Max" value={priceRange[1] === 100000 ? '' : priceRange[1]} onChange={e => setPriceRange([priceRange[0], Number(e.target.value) || 100000])} className="flex-1 px-3 py-2 rounded-lg border border-ink-0/10 dark:border-surface-1/10 bg-surface-0 dark:bg-ink-1 text-sm outline-none focus:border-brand-400" />
              </div>
            </div>

            {/* Location */}
            <div>
              <h3 className="font-semibold text-sm text-ink-0 dark:text-surface-1 mb-3">Location</h3>
              <input type="text" placeholder="City or zip code" className="w-full px-3 py-2 rounded-lg border border-ink-0/10 dark:border-surface-1/10 bg-surface-0 dark:bg-ink-1 text-sm outline-none focus:border-brand-400" />
            </div>

            {/* Condition */}
            <div>
              <h3 className="font-semibold text-sm text-ink-0 dark:text-surface-1 mb-3">Condition</h3>
              {['Brand New','Used - Like New','Used - Excellent','Used - Good','Refurbished'].map(c => (
                <label key={c} className="flex items-center gap-2 py-1.5 cursor-pointer">
                  <input type="checkbox" className="w-4 h-4 rounded border-ink-0/20 text-brand-500 focus:ring-brand-500" />
                  <span className="text-sm text-ink-3 dark:text-surface-3">{c}</span>
                </label>
              ))}
            </div>
          </div>
        </aside>

        {/* Listings Grid */}
        <div className="flex-1">
          {filtered.length > 0 ? (
            <div className={viewMode === 'grid' ? 'grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6' : 'space-y-4'}>
              {filtered.map((listing, i) => (
                viewMode === 'grid' ? <ListingCard key={listing.id} listing={listing} index={i} /> : (
                  <div key={listing.id} className="animate-fadeIn card-hover flex gap-4 p-4 bg-surface-0 dark:bg-ink-1 rounded-2xl border border-ink-0/5 dark:border-surface-1/5 cursor-pointer" onClick={() => navigate('listing', { listing })}>
                    <img src={listing.image || listing.images?.[0] || 'https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?w=600&h=400&fit=crop'} alt={listing.title} className="w-40 h-28 object-cover rounded-xl flex-shrink-0" />
                    <div className="flex-1 min-w-0">
                      <div className="flex justify-between items-start">
                        <h3 className="font-semibold text-ink-0 dark:text-surface-1 truncate">{listing.title}</h3>
                        <p className="font-bold text-brand-600 dark:text-brand-400">${Number(listing.price).toLocaleString()}</p>
                      </div>
                      <p className="text-sm text-ink-4 dark:text-surface-4 mt-1 flex items-center gap-1"><Icons.MapPin /> {listing.location}</p>
                      <p className="text-sm text-ink-4 dark:text-surface-4 mt-1">{listing.condition}</p>
                      <div className="flex items-center gap-2 mt-2">
                        <span className="text-sm font-medium">{listing.seller}</span>
                        {listing.verified && <Icons.Verified />}
                        <span className="text-xs text-ink-5">• {listing.posted}</span>
                      </div>
                    </div>
                  </div>
                )
              ))}
            </div>
          ) : (
            <div className="text-center py-20 animate-fadeIn">
              <div className="text-6xl mb-4">🔍</div>
              <h3 className="font-display text-2xl font-bold text-ink-0 dark:text-surface-1 mb-2">No listings found</h3>
              <p className="text-ink-4 dark:text-surface-4 mb-6">Try adjusting your filters or search terms</p>
              <button onClick={() => { setSelectedCategory(null); setSearchQuery(''); }} className="px-6 py-2.5 bg-brand-500 text-white font-semibold rounded-xl hover:bg-brand-600 transition-colors">Clear Filters</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ==================== LISTING DETAIL ====================
function ListingDetailPage() {
  const { selectedListing, navigate, savedListings, toggleSave, isLoggedIn, addToast, handleLogout, listings, currentUser, categories } = useApp();
  const [contactOpen, setContactOpen] = useState(false);
  const [msgText, setMsgText] = useState('');
  const [reportOpen, setReportOpen] = useState(false);
  const [reportReason, setReportReason] = useState('');
  const [reportDetails, setReportDetails] = useState('');
  const [reportSubmitting, setReportSubmitting] = useState(false);
  const [activeImage, setActiveImage] = useState(0);
  const l = selectedListing;

  useEffect(() => { setActiveImage(0); }, [l?.id]);

  if (!l) return (
    <div className="max-w-7xl mx-auto px-4 py-20 text-center animate-fadeIn">
      <p className="text-ink-4 dark:text-surface-4">Listing not found.</p>
      <button onClick={() => navigate('browse')} className="mt-4 px-6 py-2 bg-brand-500 text-white rounded-xl font-semibold">Browse Listings</button>
    </div>
  );

  const isSaved = savedListings.includes(l.id) || savedListings.includes(String(l.id));
  const cat = categories.find(c => c.id === l.category);
  const sellerName = l.seller || l.sellerName || 'Unknown';
  const allListings = listings || [];
  const similar = allListings.filter(x => x.category === l.category && x.id !== l.id).slice(0, 3);
  const fallbackImage = 'https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?w=600&h=400&fit=crop';
  // Real photo gallery: prefer the images[] array (all uploaded photos), fall
  // back to the single cover image, then to a placeholder if there's none.
  const galleryImages = (Array.isArray(l.images) && l.images.length > 0)
    ? l.images
    : (l.image ? [l.image] : [fallbackImage]);
  const mainImage = galleryImages[activeImage] || galleryImages[0];

  const handleContact = async () => {
    if (!isLoggedIn) { addToast('Please log in to contact sellers', 'error'); return; }
    if (currentUser?.uid === l.userId) { addToast("You can't message yourself", 'error'); return; }
    if (!isFirebaseReady() || !msgText.trim()) return;
    try {
      const sellerUid = l.userId || 'unknown';
      await fbSendMessage(currentUser?.uid, sellerUid, currentUser?.name || 'User', msgText, l.id);
      addToast('Message sent to seller!');
      setMsgText('');
      setContactOpen(false);
    } catch(e) { addToast('Failed to send message', 'error'); }
  };

  const handleReport = async () => {
    if (!isLoggedIn) { addToast('Please log in to report a listing', 'error'); return; }
    if (!reportReason) { addToast('Please select a reason', 'error'); return; }
    if (!isFirebaseReady()) return;
    setReportSubmitting(true);
    try {
      await fbSubmitReport({
        listingId: l.id,
        listingTitle: l.title,
        sellerUid: l.userId || null,
        sellerName: sellerName,
        reporterUid: currentUser?.uid || null,
        reporterName: currentUser?.name || 'User',
        reason: reportReason,
        details: reportDetails.trim() || null
      });
      addToast('Report submitted. Our team will review it.');
      setReportOpen(false);
      setReportReason('');
      setReportDetails('');
    } catch(e) { addToast('Failed to submit report', 'error'); }
    setReportSubmitting(false);
  };

  return (
    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 animate-fadeIn">
      {/* Breadcrumb */}
      <button onClick={() => navigate('browse')} className="flex items-center gap-1.5 text-sm text-ink-4 dark:text-surface-4 hover:text-brand-500 mb-6 transition-colors">
        <Icons.ArrowLeft className="rtl-flip" /> Back to listings
      </button>

      <div className="grid grid-cols-1 lg:grid-cols-5 gap-8">
        {/* LEFT: Images + Details */}
        <div className="lg:col-span-3">
          <div className="rounded-2xl overflow-hidden mb-6 aspect-[16/10] bg-surface-2 dark:bg-ink-1">
            <img src={mainImage} alt={l.title} className="w-full h-full object-cover" />
          </div>

          {/* Image thumbnails — only shown when the listing actually has more than one photo */}
          {galleryImages.length > 1 && (
            <div className="grid grid-cols-4 gap-2 mb-8">
              {galleryImages.map((img, i) => (
                <div
                  key={i}
                  onClick={() => setActiveImage(i)}
                  className={`aspect-square rounded-xl overflow-hidden bg-surface-2 dark:bg-ink-1 border-2 cursor-pointer transition-all ${activeImage === i ? 'border-brand-500' : 'border-transparent hover:border-brand-400'}`}
                >
                  <img src={img} alt="" className={`w-full h-full object-cover transition-opacity ${activeImage === i ? 'opacity-100' : 'opacity-80 hover:opacity-100'}`} />
                </div>
              ))}
            </div>
          )}

          {/* Description */}
          <div className="mb-8">
            <div className="flex items-center gap-2 mb-2">
              <span className="px-3 py-1 bg-surface-2 dark:bg-ink-1 rounded-lg text-xs font-medium text-ink-3 dark:text-surface-3">{cat?.name}</span>
              <span className="px-3 py-1 bg-surface-2 dark:bg-ink-1 rounded-lg text-xs font-medium text-ink-3 dark:text-surface-3">{l.condition}</span>
            </div>
            <h1 className="font-display text-3xl sm:text-4xl font-bold text-ink-0 dark:text-surface-1 mb-3">{l.title}</h1>
            <div className="flex flex-wrap items-center gap-4 text-sm text-ink-4 dark:text-surface-4">
              <span className="flex items-center gap-1.5"><Icons.MapPin /> {l.location}</span>
              <span>Posted {timeAgoFromTimestamp(l.createdAt) || 'recently'}</span>
              <span className="flex items-center gap-1"><Icons.Eye /> {(l.views || 0).toLocaleString()} views</span>
              <span className="flex items-center gap-1"><Icons.Heart filled={false} /> {(l.favorites || 0)} saves</span>
            </div>
            <hr className="my-6 border-ink-0/5 dark:border-surface-1/5" />
            <h2 className="font-semibold text-ink-0 dark:text-surface-1 mb-3">Description</h2>
            <p className="text-ink-3 dark:text-surface-3 leading-relaxed">
              This is a premium listing in excellent condition. The seller has verified the item's authenticity and quality.
              Contact the seller for more details, additional photos, or to schedule a viewing. Serious inquiries only.
              All offers will be considered. Price is negotiable for quick sale.
            </p>
            <div className="flex flex-wrap gap-2 mt-4">
              {['verified','premium','shipping-available','negotiable'].map(tag => (
                <span key={tag} className="px-3 py-1 rounded-full bg-brand-50 dark:bg-brand-950/20 text-brand-600 dark:text-brand-400 text-xs font-medium capitalize">{tag.replace('-', ' ')}</span>
              ))}
            </div>
          </div>
        </div>

        {/* RIGHT: Price + Seller */}
        <div className="lg:col-span-2">
          <div className="sticky top-24 space-y-4">
            {/* Price Card */}
            <div className="bg-surface-0 dark:bg-ink-1 rounded-2xl border border-ink-0/5 dark:border-surface-1/5 p-6">
              <p className="font-display text-4xl font-bold text-ink-0 dark:text-surface-1">
                ${l.price.toLocaleString()}
                {l.priceLabel && <span className="text-lg font-normal text-ink-4">{l.priceLabel}</span>}
              </p>
              <div className="flex gap-2 mt-4">
                {currentUser?.uid === l.userId ? (

                    This is your listing

                    Contact Seller
                  </button>
                )}
                <button onClick={() => toggleSave(l.id)} className={`w-12 rounded-xl border flex items-center justify-center transition-all ${isSaved ? 'bg-brand-50 dark:bg-brand-950/30 border-brand-300 text-brand-500' : 'border-ink-0/10 dark:border-surface-1/10 text-ink-4 hover:text-red-500'}`}>
                  <Icons.Heart filled={isSaved} />
                </button>
              </div>
              <button onClick={() => setReportOpen(true)} className="w-full mt-2 py-3 border border-ink-0/10 dark:border-surface-1/10 rounded-xl text-sm font-medium hover:border-brand-300 dark:hover:border-brand-700 transition-colors flex items-center justify-center gap-2">

                  <p className="font-bold text-ink-0 dark:text-surface-1">{l.favorites || 0}</p>

                <Icons.Shield />

              <ul className="space-y-1.5 text-xs text-ink-3 dark:text-surface-4">

            {similar.map((item, i) => <ListingCard key={item.id} listing={item} index={i} />)}

            <select
              value={reportReason}

            >
              <option value="">Select a reason...</option>
              <option value="scam">Scam or fraud</option>
              <option value="prohibited">Prohibited item</option>
              <option value="misleading">Misleading description</option>
              <option value="offensive">Offensive content</option>
              <option value="spam">Spam or duplicate</option>
              <option value="other">Other</option>
            </select>

            <label className="text-xs font-semibold text-ink-4 dark:text-surface-4 uppercase tracking-wider">Additional details (optional)</label>
            <textarea
              value={reportDetails}
              onChange={e => setReportDetails(e.target.value)}

              placeholder="Tell us more about the issue..."
              className="w-full mt-1.5 px-4 py-3 rounded-xl border border-ink-0/10 dark:border-surface-1/10 bg-surface-1 dark:bg-ink-2 outline-none focus:border-brand-400 resize-none text-sm"
            />
            <button onClick={handleReport} disabled={reportSubmitting} className="w-full mt-4 py-3 bg-gradient-to-r from-brand-500 to-brand-600 text-white font-semibold rounded-xl hover:from-brand-600 hover:to-brand-700 transition-all disabled:opacity-50">
              {reportSubmitting ? 'Submitting...' : 'Submit Report'}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ==================== CREATE LISTING ====================
function CreateListingPage() {
  const { navigate, addToast, isLoggedIn, currentUser, reloadMyListings, categories } = useApp();
  const [images, setImages] = useState([]);
  const [imageFiles, setImageFiles] = useState([]);
  const [dragOver, setDragOver] = useState(false);
  const [form, setForm] = useState({ title: '', description: '', price: '', category: '', location: '', tags: '', contact: 'email' });
  const [step, setStep] = useState(1);
  const [publishing, setPublishing] = useState(false);

  if (!isLoggedIn) {
    return (
      <div className="max-w-md mx-auto px-4 py-20 text-center animate-fadeIn">
        <div className="text-6xl mb-4">🔐</div>
        <h2 className="font-display text-2xl font-bold mb-2">Sign in to create a listing</h2>
        <p className="text-ink-4 dark:text-surface-4 mb-6">You need an account to sell on MarketHub</p>
        <div className="flex gap-3 justify-center">
          <button onClick={() => navigate('login')} className="px-6 py-2.5 bg-brand-500 text-white font-semibold rounded-xl">Log In</button>
          <button onClick={() => navigate('register')} className="px-6 py-2.5 border border-ink-0/10 dark:border-surface-1/10 font-semibold rounded-xl">Sign Up</button>
        </div>
      </div>
    );
  }

  const handleDrop = (e) => {
    e.preventDefault(); setDragOver(false);
    const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
    addImages(files);
  };
  const addImages = (files) => {
    const urls = files.map(f => URL.createObjectURL(f));
    setImages(prev => [...prev, ...urls].slice(0, 8));
    setImageFiles(prev => [...prev, ...files].slice(0, 8));
  };
  const removeImage = (i) => {
    setImages(prev => prev.filter((_, idx) => idx !== i));
    setImageFiles(prev => prev.filter((_, idx) => idx !== i));
  };

  const [uploadingImages, setUploadingImages] = useState(false);

  const handleSubmit = async () => {
    if (!form.title || !form.price || !form.category) { addToast('Please fill in required fields', 'error'); return; }
    if (imageFiles.length === 0) { addToast('Please add at least one photo', 'error'); return; }
    setPublishing(true);
    try {
      setUploadingImages(true);
      const uploadedUrls = await fbUploadImages(imageFiles);
      setUploadingImages(false);
      const coverImage = uploadedUrls[0];
      await fbCreateListing({
        title: form.title,
        description: form.description,
        price: Number(form.price),
        category: form.category,
        location: form.location || 'Unknown',
        image: coverImage,
        images: uploadedUrls,
        condition: 'Brand New',
        tags: form.tags ? form.tags.split(',').map(t => t.trim()) : [],
        contact: form.contact
      });
      await reloadMyListings();
      addToast('Listing submitted! It will go live once approved by an admin.');
      navigate('seller-dashboard');
    } catch(e) {
      console.error(e);
      addToast('Failed to publish listing. Check your Firestore/Storage rules.', 'error');
    }
    setUploadingImages(false);
    setPublishing(false);
  };

  return (
    <div className="max-w-3xl mx-auto px-4 sm:px-6 py-8 animate-fadeIn">
      <h1 className="font-display text-3xl font-bold text-ink-0 dark:text-surface-1 mb-2">Create a Listing</h1>
      <p className="text-ink-4 dark:text-surface-4 mb-8">Fill in the details to post your item or service</p>

      {/* Progress Steps */}
      <div className="flex items-center gap-2 mb-10">
        {[1,2,3].map(s => (
          <div key={s} className="flex items-center gap-2 flex-1">
            <button onClick={() => setStep(s)} className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold transition-all ${step >= s ? 'bg-brand-500 text-white' : 'bg-surface-2 dark:bg-ink-2 text-ink-4 dark:text-surface-4'}`}>{s}</button>
            {s < 3 && <div className={`flex-1 h-0.5 rounded-full transition-all ${step > s ? 'bg-brand-500' : 'bg-surface-2 dark:bg-ink-2'}`} />}
          </div>
        ))}
      </div>

      {step === 1 && (
        <div className="animate-fadeIn space-y-6">
          {/* Image Upload */}
          <div>
            <label className="block font-semibold text-sm mb-2">Photos <span className="text-ink-4 dark:text-surface-4 font-normal">(up to 8)</span></label>
            <div
              onDragOver={e => { e.preventDefault(); setDragOver(true); }}
              onDragLeave={() => setDragOver(false)}
              onDrop={handleDrop}
              className={`border-2 border-dashed rounded-2xl p-8 text-center transition-all cursor-pointer ${dragOver ? 'drop-zone-active border-brand-400 bg-brand-50 dark:bg-brand-950/10' : 'border-ink-0/10 dark:border-surface-1/10 hover:border-brand-300 dark:hover:border-brand-700'}`}
              onClick={() => document.getElementById('fileInput').click()}
            >
              <input id="fileInput" type="file" multiple accept="image/*" className="hidden" onChange={e => addImages(Array.from(e.target.files))} />
              <div className="flex flex-col items-center">
                <div className="w-16 h-16 rounded-2xl bg-brand-50 dark:bg-brand-950/30 flex items-center justify-center mb-4 text-brand-500">
                  <Icons.Upload />
                </div>
                <p className="font-semibold text-ink-0 dark:text-surface-1 mb-1">Drop images here or click to browse</p>
                <p className="text-sm text-ink-4 dark:text-surface-4">PNG, JPG, WEBP up to 10MB each</p>
              </div>
            </div>
            {images.length > 0 && (
              <div className="grid grid-cols-4 gap-2 mt-4">
                {images.map((img, i) => (
                  <div key={i} className="relative aspect-square rounded-xl overflow-hidden group">
                    <img src={img} alt="" className="w-full h-full object-cover" />
                    <button onClick={() => removeImage(i)} className="absolute top-1 right-1 w-6 h-6 bg-ink-0/70 text-white rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity text-xs">✕</button>

function LoginPage() {

      addToast('Welcome back! You are now logged in.');

      const msg = err.code === 'auth/invalid-credential' ? 'Invalid email or password'

// ==================== MESSAGES ====================
function MessagesPage() {
  const { messages, setMessages, chatMessages, setChatMessages, isLoggedIn, navigate, addToast, currentUser, activeConvId, setActiveConvId } = useApp();
  const [newMsg, setNewMsg] = useState('');
  const [typing, setTyping] = useState(false);
  const messagesEndRef = useRef(null);

  if (!isLoggedIn) {
    return (
      <div className="max-w-md mx-auto px-4 py-20 text-center animate-fadeIn">
        <div className="text-6xl mb-4">💬</div>
        <h2 className="font-display text-2xl font-bold mb-2">Sign in to access messages</h2>
        <p className="text-ink-4 dark:text-surface-4 mb-6">Connect with buyers and sellers</p>
        <button onClick={() => navigate('login')} className="px-6 py-2.5 bg-brand-500 text-white font-semibold rounded-xl">Log In</button>
      </div>
    );
  }

  const activeConv = messages.find(m => m.id === activeConvId);

  // Subscribe to messages in real time when active conversation changes.
  // fbListenMessages fires immediately with current messages, then again
  // automatically whenever a new message arrives — no refresh needed.
  useEffect(() => {
    if (!activeConvId) { setChatMessages([]); return; }
    const unsub = fbListenMessages(activeConvId, (msgs) => {
      setChatMessages(msgs.map(m => ({
        id: m.id,
        sender: m.from === currentUser?.uid ? 'me' : 'them',
        text: m.text,
        time: m.createdAt?.toDate?.()?.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) || ''
      })));
    });
    return () => unsub();
  }, [activeConvId]);

  // Auto-scroll
  useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [chatMessages]);

  const sendMessage = async () => {
    if (!newMsg.trim() || !activeConvId) return;
    const text = newMsg;
    setNewMsg('');
    try {
      // activeConvId is the conv document ID; from needs the other user's UID
      const otherUid = activeConv?.from || activeConvId.split('_').find(p => p !== currentUser?.uid);
      await fbSendMessage(currentUser.uid, otherUid, currentUser.name, text, null);
      // No manual refresh needed — the fbListenMessages subscription above
      // picks up the new message automatically and updates chatMessages.
    } catch(e) { addToast('Failed to send message', 'error'); }
  };

  return (
    <div className="max-w-6xl mx-auto px-4 sm:px-6 py-8 animate-fadeIn">      <h1 className="font-display text-3xl font-bold text-ink-0 dark:text-surface-1 mb-6">Messages</h1>
      <div className="flex gap-4 h-[calc(100vh-200px)] min-h-[500px]">
        {/* Conversation List */}
        <div className={`${activeConvId ? 'hidden md:flex' : 'flex'} flex-col w-full md:w-80 flex-shrink-0 bg-surface-0 dark:bg-ink-1 rounded-2xl border border-ink-0/5 dark:border-surface-1/5 overflow-hidden`}>
          <div className="p-4 border-b border-ink-0/5 dark:border-surface-1/5">
            <input type="text" placeholder="Search conversations..." className="w-full px-3 py-2 rounded-xl bg-surface-2/50 dark:bg-ink-2/50 border-none outline-none text-sm" />
          </div>
          <div className="flex-1 overflow-y-auto">
            {messages.map(m => (
              <button key={m.id} onClick={() => { setActiveConvId(m.id); setMessages(prev => prev.map(x => x.id === m.id ? {...x, unread: 0} : x)); }}
                className={`w-full flex items-center gap-3 p-4 hover:bg-surface-2/50 dark:hover:bg-ink-2/50 transition-colors border-b border-ink-0/5 dark:border-surface-1/5 text-left ${activeConvId === m.id ? 'bg-brand-50/50 dark:bg-brand-950/10' : ''}`}>
                <div className="relative flex-shrink-0">
                  <img src={m.avatar} alt={m.from} className="w-11 h-11 rounded-full object-cover" />
                  {m.online && <div className="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-surface-0 dark:border-ink-1" />}
                </div>
                <div className="flex-1 min-w-0">
                  <div className="flex justify-between items-center">
                    <p className="font-semibold text-sm truncate">{m.from}</p>
                    <span className="text-[10px] text-ink-5 flex-shrink-0">{m.time}</span>
                  </div>
                  <p className="text-xs text-ink-4 dark:text-surface-4 truncate mt-0.5">{m.lastMessage}</p>
                </div>
                {m.unread > 0 && <span className="w-5 h-5 bg-brand-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center flex-shrink-0">{m.unread}</span>}
              </button>
            ))}
          </div>
        </div>

        {/* Chat Area */}
        <div className={`${activeConvId ? 'flex' : 'hidden md:flex'} flex-col flex-1 bg-surface-0 dark:bg-ink-1 rounded-2xl border border-ink-0/5 dark:border-surface-1/5 overflow-hidden`}>
          {activeConv ? (
            <>
              {/* Chat Header */}
              <div className="flex items-center gap-3 p-4 border-b border-ink-0/5 dark:border-surface-1/5">
                <button onClick={() => setActiveConvId(null)} aria-label="Back to conversation list" className="md:hidden text-ink-4"><Icons.ArrowLeft className="rtl-flip" /></button>
                <img src={activeConv.avatar} alt={`${activeConv.from}'s profile photo`} className="w-9 h-9 rounded-full object-cover" />
                <div className="flex-1">
                  <p className="font-semibold text-sm">{activeConv.from}</p>
                  <p className="text-[10px] text-green-500">{activeConv.online ? 'Online' : 'Offline'}</p>
                </div>
              </div>

              {/* Messages */}
              <div className="flex-1 overflow-y-auto p-4 space-y-3">
                {chatMessages.map(msg => (
                  <div key={msg.id} className={`flex ${msg.sender === 'me' ? 'justify-end' : 'justify-start'}`}>
                    <div className={`max-w-[75%] px-4 py-2.5 ${msg.sender === 'me' ? 'chat-bubble-sent bg-brand-500 text-white' : 'chat-bubble-received bg-surface-2 dark:bg-ink-2 text-ink-0 dark:text-surface-2'}`}>
                      <p className="text-sm">{msg.text}</p>
                      <p className={`text-[10px] mt-1 ${msg.sender === 'me' ? 'text-white/60' : 'text-ink-4 dark:text-surface-4'}`}>{msg.time} {msg.sender === 'me' && '✓✓'}</p>
                    </div>
                  </div>
                ))}
                {typing && (
                  <div className="flex justify-start">

// ==================== CATEGORIES MANAGER ====================
// ==================== OWNER-ONLY GATE ====================
// Wraps sensitive admin sections (Categories, Site Settings). Two layers:
// 1) Real: only currentUser.uid === OWNER_UID even gets past this component at all —
//    and Firestore rules independently reject writes from any other UID regardless of this UI.
// 2) Convenience: even you must enter a password each browser session before editing,
//    in case a logged-in session is left open on a shared/public device.
function SuperAdminGate({ children, label = 'this section' }) {
  const { currentUser, addToast, fbReady } = useApp();
  const [unlocked, setUnlocked] = useState(() => sessionStorage.getItem('mh_superadmin_unlocked') === 'true');
  const [pwInput, setPwInput] = useState('');
  const [confirmInput, setConfirmInput] = useState('');
  const [storedPassword, setStoredPassword] = useState(undefined); // undefined = still loading, null = not set yet
  const [busy, setBusy] = useState(false);

  const isOwner = currentUser?.uid === OWNER_UID;

  useEffect(() => {
    if (!isOwner || !fbReady) return;
    fbGetSuperAdminPassword().then(setStoredPassword).catch(() => setStoredPassword(null));
  }, [isOwner, fbReady]);

  if (!isOwner) {
    return (
      <div className="bg-surface-0 dark:bg-ink-1 rounded-2xl border border-ink-0/5 dark:border-surface-1/5 p-10 text-center">
        <div className="text-4xl mb-3">🔒</div>
        <p className="font-semibold text-ink-0 dark:text-surface-1">Restricted</p>
        <p className="text-sm text-ink-4 dark:text-surface-4 mt-1">Only the site owner can access {label}.</p>
      </div>
    );
  }

  if (!unlocked) {
    // Still fetching whether a password has ever been set
    if (storedPassword === undefined) {
      return (
        <div className="bg-surface-0 dark:bg-ink-1 rounded-2xl border border-ink-0/5 dark:border-surface-1/5 p-10 text-center max-w-sm mx-auto">
          <p className="text-sm text-ink-4 dark:text-surface-4">Loading…</p>
        </div>
      );
    }

    // First time ever: no password has been set yet, so let the owner create one
    if (storedPassword === null) {
      const handleCreate = async (e) => {
        e.preventDefault();
        if (pwInput.length < 4) { addToast('Password must be at least 4 characters', 'error'); return; }
        if (pwInput !== confirmInput) { addToast('Passwords do not match', 'error'); return; }
        setBusy(true);
        try {
          await fbSetSuperAdminPassword(pwInput);
          setStoredPassword(pwInput);
          sessionStorage.setItem('mh_superadmin_unlocked', 'true');
          setUnlocked(true);
          setPwInput(''); setConfirmInput('');
          addToast('Owner password set!');
        } catch (err) {
          console.error(err);
          addToast('Failed to set password', 'error');
        }
        setBusy(false);
      };
      return (
        <form onSubmit={handleCreate} className="bg-surface-0 dark:bg-ink-1 rounded-2xl border border-ink-0/5 dark:border-surface-1/5 p-10 text-center max-w-sm mx-auto">
          <div className="text-4xl mb-3">🔐</div>
          <p className="font-semibold text-ink-0 dark:text-surface-1 mb-1">Set an owner password</p>
          <p className="text-sm text-ink-4 dark:text-surface-4 mb-4">No password has been set yet. Choose one to protect {label} — you can change it later from Site Settings.</p>
          <input
            type="password" autoFocus value={pwInput} onChange={e => setPwInput(e.target.value)}
            placeholder="New password"
            className="w-full px-4 py-2.5 rounded-xl border border-ink-0/10 dark:border-surface-1/10 bg-surface-0 dark:bg-ink-1 outline-none focus:border-brand-400 text-sm mb-3"
          />
          <input
            type="password" value={confirmInput} onChange={e => setConfirmInput(e.target.value)}
            placeholder="Confirm password"
            className="w-full px-4 py-2.5 rounded-xl border border-ink-0/10 dark:border-surface-1/10 bg-surface-0 dark:bg-ink-1 outline-none focus:border-brand-400 text-sm mb-3"
          />
          <button type="submit" disabled={busy} className="w-full py-2.5 bg-brand-500 text-white font-semibold rounded-xl hover:bg-brand-600 transition-colors text-sm disabled:opacity-50">
            {busy ? 'Saving...' : 'Set Password'}
          </button>
        </form>
      );
    }

    const handleUnlock = (e) => {
      e.preventDefault();
      if (pwInput === storedPassword) {
        sessionStorage.setItem('mh_superadmin_unlocked', 'true');
        setUnlocked(true);
        setPwInput('');
      } else {
        addToast('Incorrect password', 'error');
      }
    };
    return (
      <form onSubmit={handleUnlock} className="bg-surface-0 dark:bg-ink-1 rounded-2xl border border-ink-0/5 dark:border-surface-1/5 p-10 text-center max-w-sm mx-auto">
        <div className="text-4xl mb-3">🔐</div>
        <p className="font-semibold text-ink-0 dark:text-surface-1 mb-1">Owner password required</p>
        <p className="text-sm text-ink-4 dark:text-surface-4 mb-4">Enter your password to unlock {label} for this session.</p>
        <input
          type="password" autoFocus value={pwInput} onChange={e => setPwInput(e.target.value)}
          placeholder="Password"
          className="w-full px-4 py-2.5 rounded-xl border border-ink-0/10 dark:border-surface-1/10 bg-surface-0 dark:bg-ink-1 outline-none focus:border-brand-400 text-sm mb-3"
        />
        <button type="submit" className="w-full py-2.5 bg-brand-500 text-white font-semibold rounded-xl hover:bg-brand-600 transition-colors text-sm">Unlock</button>
      </form>
    );
  }

  return children;
}

function CategoriesManager() {
  const { categories, reloadCategories, addToast, currentUser } = useApp();
  const [form, setForm] = useState({ name: '', icon: '' });
  const [editId, setEditId] = useState(null);
  const [editForm, setEditForm] = useState({ name: '', icon: '' });
  const [loading, setLoading] = useState(false);

  const handleAdd = async (e) => {
    e.preventDefault();
    if (!form.name || !form.icon) { addToast('Name and icon are required', 'error'); return; }
    setLoading(true);
    try {
      await fbAddCategory({ name: form.name, icon: form.icon, id: form.name.toLowerCase().replace(/\s+/g, '-') });
      await reloadCategories();
      setForm({ name: '', icon: '' });
      addToast('Category added!');
    } catch(e) { addToast('Failed to add category', 'error'); }
    setLoading(false);
  };

  const handleEdit = async (cat) => {
    setEditId(cat.docId);
    setEditForm({ name: cat.name, icon: cat.icon });
  };

  const handleSaveEdit = async () => {
    if (!editForm.name || !editForm.icon) { addToast('Name and icon are required', 'error'); return; }
    setLoading(true);
    try {
      await fbUpdateCategory(editId, { name: editForm.name, icon: editForm.icon });
      await reloadCategories();
      setEditId(null);
      addToast('Category updated!');
    } catch(e) { addToast('Failed to update category', 'error'); }
    setLoading(false);
  };

  const handleDelete = async (cat) => {
    if (!confirm(`Delete "${cat.name}"?`)) return;
    setLoading(true);
    try {
      await fbDeleteCategory(cat.docId, cat.id);
      await reloadCategories();
      addToast('Category deleted');
    } catch(e) {
      addToast(e.code === 'CATEGORY_IN_USE' ? e.message : 'Failed to delete category', 'error');
    }
    setLoading(false);
  };

  const POPULAR_ICONS = ['🚗','🏠','📱','🎮','💼','🎨','🛋️','👗','📚','🏺','🐾','⚽','🏭','🔧','🍔','✈️','💄','🎵','📷','🌿','🏋️','🎓','💎','🛒','🧸','🎪','🏡','🚀','🎯','🛺'];

  return (
    <div className="animate-fadeIn space-y-6">
      {/* Add Category Form */}
      <div className="bg-surface-0 dark:bg-ink-1 rounded-2xl border border-ink-0/5 dark:border-surface-1/5 p-6">
        <h3 className="font-semibold text-ink-0 dark:text-surface-1 mb-4">Add New Category</h3>
        <form onSubmit={handleAdd} className="space-y-4">
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label className="block text-sm font-medium mb-1.5">Category Name *</label>
              <input type="text" value={form.name} onChange={e => setForm({...form, name: e.target.value})}
                placeholder="e.g. Electronics" className="w-full px-4 py-2.5 rounded-xl border border-ink-0/10 dark:border-surface-1/10 bg-surface-1 dark:bg-ink-2 outline-none focus:border-brand-400 text-sm" />
            </div>
            <div>
              <label className="block text-sm font-medium mb-1.5">Icon (emoji) *</label>
              <input type="text" value={form.icon} onChange={e => setForm({...form, icon: e.target.value})}
                placeholder="e.g. 📱" className="w-full px-4 py-2.5 rounded-xl border border-ink-0/10 dark:border-surface-1/10 bg-surface-1 dark:bg-ink-2 outline-none focus:border-brand-400 text-sm" />
            </div>
          </div>
          {/* Quick icon picker */}
          <div>
            <p className="text-xs text-ink-4 dark:text-surface-4 mb-2">Quick pick:</p>
            <div className="flex flex-wrap gap-2">
              {POPULAR_ICONS.map(ic => (
                <button key={ic} type="button" onClick={() => setForm({...form, icon: ic})}
                  className={`w-9 h-9 rounded-lg text-xl flex items-center justify-center hover:bg-brand-50 dark:hover:bg-brand-950/20 transition-colors ${form.icon === ic ? 'bg-brand-50 dark:bg-brand-950/30 ring-2 ring-brand-400' : 'bg-surface-2/50 dark:bg-ink-2/50'}`}>

            {loading ? 'Adding...' : '+ Add Category'}

        {categories.length === 0 ? (

            <div className="text-4xl mb-3">🏷️</div>

            {categories.map(cat => (
              <div key={cat.docId} className="flex items-center gap-4 p-4">
                {editId === cat.docId ? (
                  <>
                    <input type="text" value={editForm.icon} onChange={e => setEditForm({...editForm, icon: e.target.value})}

                    <input type="text" value={editForm.name} onChange={e => setEditForm({...editForm, name: e.target.value})}

                    <button onClick={handleSaveEdit} disabled={loading}

                      className="px-3 py-1.5 border border-ink-0/10 dark:border-surface-1/10 text-xs font-medium rounded-lg hover:border-brand-300 transition-colors">Cancel</button>
                  </>
                ) : (
                  <>
                    <div className="text-3xl w-10 text-center">{cat.icon}</div>
                    <div className="flex-1">
                      <p className="font-semibold text-sm text-ink-0 dark:text-surface-1">{cat.name}</p>
                    </div>
                    <button onClick={() => handleEdit(cat)}
                      className="p-2 rounded-lg hover:bg-ink-0/5 dark:hover:bg-surface-1/5 text-ink-4 dark:text-surface-4 transition-colors">
                      <Icons.Edit />
                    </button>
                    <button onClick={() => handleDelete(cat)}
                      className="p-2 rounded-lg hover:bg-red-50 dark:hover:bg-red-950/20 text-ink-4 hover:text-red-500 transition-colors">
                      <Icons.Trash />
                    </button>
                  </>
                )}

            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function SiteSettingsManager() {

  const [form, setForm] = useState({ siteName: '', tagline: '', supportEmail: '' });

  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    if (!loaded && siteSettings) {
      setForm({
        siteName: siteSettings.siteName || 'MarketHub',
        tagline: siteSettings.tagline || 'The modern marketplace for buying, selling, and offering services across every niche.',

      });
      setLoaded(true);
    }
  }, [siteSettings, loaded]);

  const handleSave = async (e) => {

  );

// Lets the owner change the "owner password required" gate password from the site
// itself, instead of editing a hardcoded value in the code.
function OwnerPasswordManager() {
  const { addToast } = useApp();
  const [current, setCurrent] = useState('');
  const [next, setNext] = useState('');
  const [confirm, setConfirm] = useState('');
  const [loading, setLoading] = useState(false);

  const handleSave = async (e) => {
    e.preventDefault();
    setLoading(true);
    try {
      const actual = await fbGetSuperAdminPassword();
      if (actual !== null && current !== actual) {
        addToast('Current password is incorrect', 'error');
        setLoading(false);
        return;
      }
      if (next.length < 4) { addToast('New password must be at least 4 characters', 'error'); setLoading(false); return; }
      if (next !== confirm) { addToast('New passwords do not match', 'error'); setLoading(false); return; }
      await fbSetSuperAdminPassword(next);
      setCurrent(''); setNext(''); setConfirm('');
      addToast('Owner password updated!');
    } catch (err) {
      console.error(err);
      addToast('Failed to update password', 'error');
    }
    setLoading(false);
  };

  return (
    <form onSubmit={handleSave} className="bg-surface-0 dark:bg-ink-1 rounded-2xl border border-ink-0/5 dark:border-surface-1/5 p-6 max-w-xl space-y-5 mt-6">
      <div>
        <h3 className="font-semibold text-lg text-ink-0 dark:text-surface-1">Owner Password</h3>
        <p className="text-sm text-ink-4 dark:text-surface-4 mt-1">This is the extra password required to unlock Categories and Site Settings each session.</p>
      </div>
      <div>
        <label className="block font-semibold text-sm mb-2">Current Password</label>
        <input type="password" value={current} onChange={e => setCurrent(e.target.value)} placeholder="••••••••"
          className="w-full px-4 py-2.5 rounded-xl border border-ink-0/10 dark:border-surface-1/10 bg-surface-0 dark:bg-ink-1 outline-none focus:border-brand-400 text-sm" />
      </div>
      <div>
        <label className="block font-semibold text-sm mb-2">New Password</label>
        <input type="password" value={next} onChange={e => setNext(e.target.value)} placeholder="Min. 4 characters"
          className="w-full px-4 py-2.5 rounded-xl border border-ink-0/10 dark:border-surface-1/10 bg-surface-0 dark:bg-ink-1 outline-none focus:border-brand-400 text-sm" />
      </div>
      <div>
        <label className="block font-semibold text-sm mb-2">Confirm New Password</label>
        <input type="password" value={confirm} onChange={e => setConfirm(e.target.value)} placeholder="Repeat new password"
          className="w-full px-4 py-2.5 rounded-xl border border-ink-0/10 dark:border-surface-1/10 bg-surface-0 dark:bg-ink-1 outline-none focus:border-brand-400 text-sm" />
      </div>
      <button type="submit" disabled={loading}
        className="px-6 py-2.5 bg-gradient-to-r from-brand-500 to-brand-600 text-white font-semibold rounded-xl hover:from-brand-600 hover:to-brand-700 transition-all shadow-lg shadow-brand-500/20 disabled:opacity-50 text-sm">
        {loading ? 'Saving...' : 'Update Password'}
      </button>
    </form>
  );
}

// ==================== ADMIN DASHBOARD ====================
function AdminDashboardPage() {
  const { isLoggedIn, navigate, listings, categories, reloadCategories, currentUser, pendingListings, reloadPendingListings, reloadListings, addToast } = useApp();
  const [activeTab, setActiveTab] = useState('overview');
  const [userSearch, setUserSearch] = useState('');

  if (!isLoggedIn) { navigate('login'); return null; }
  if (currentUser?.role !== 'ADMIN') { navigate('home'); return null; }

  useEffect(() => { reloadPendingListings(); }, [reloadPendingListings]);

  const handleApprove = async (id) => {
    try { await fbModerateListing(id, 'approved'); await Promise.all([reloadPendingListings(), reloadListings()]); addToast('Listing approved'); }
    catch(e) { addToast('Failed to approve listing', 'error'); }
  };
  const handleReject = async (id) => {
    const reason = window.prompt('Reason for rejection (shown to seller, optional):') || '';
    try { await fbModerateListing(id, 'rejected', reason); await Promise.all([reloadPendingListings(), reloadListings()]); addToast('Listing rejected'); }
    catch(e) { addToast('Failed to reject listing', 'error'); }
  };

  const tabs = ['overview','users','listings','reports','categories','site-settings'];

  const [realStats, setRealStats] = useState({ totalUsers: null, approvedListings: null, rejectedListings: null });
  const [recentUsers, setRecentUsers] = useState([]);
  const [allUsers, setAllUsers] = useState([]);
  const [statsLoading, setStatsLoading] = useState(true);
  const [reports, setReports] = useState([]);
  const [reportsLoading, setReportsLoading] = useState(true);

  const reloadReports = useCallback(async () => {
    setReportsLoading(true);
    try { setReports(await fbGetReports()); }
    catch(e) { console.error('Failed to load reports', e); }
    setReportsLoading(false);
  }, []);

  useEffect(() => { reloadReports(); }, [reloadReports]);

  const handleResolveReport = async (id, status) => {
    try {
      await fbResolveReport(id, status);
      setReports(prev => prev.map(r => r.id === id ? { ...r, status } : r));
      addToast(status === 'resolved' ? 'Report marked resolved' : 'Report dismissed');
    } catch(e) { addToast('Failed to update report', 'error'); }
  };

  useEffect(() => {
    let cancelled = false;
    (async () => {
      setStatsLoading(true);
      try {
        const [totalUsers, approvedListings, rejectedListings, users, moreUsers] = await Promise.all([
          fbCountUsers(), fbCountListingsByStatus('approved'), fbCountListingsByStatus('rejected'), fbGetRecentUsers(5), fbGetRecentUsers(50)
        ]);
        if (cancelled) return;
        setRealStats({ totalUsers, approvedListings, rejectedListings });
        setRecentUsers(users);
        setAllUsers(moreUsers);
      } catch(e) { console.error('Failed to load admin stats', e); }
      if (!cancelled) setStatsLoading(false);
    })();
    return () => { cancelled = true; };
  }, [pendingListings.length]);

  const fmt = (n) => n === null ? '—' : n.toLocaleString();
  const timeAgo = (ts) => {
    if (!ts?.seconds) return '—';
    const diffMs = Date.now() - ts.seconds * 1000;
    const mins = Math.floor(diffMs / 60000);
    if (mins < 1) return 'Just now';
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    const days = Math.floor(hrs / 24);
    if (days < 30) return `${days}d ago`;
    return new Date(ts.seconds * 1000).toLocaleDateString();
  };

  const adminStats = [
    { label: 'Total Users', value: fmt(realStats.totalUsers), icon: <Icons.Users /> },
    { label: 'Approved Listings', value: fmt(realStats.approvedListings), icon: <Icons.Package /> },
    { label: 'Pending Review', value: String(pendingListings.length), icon: <Icons.Flag /> },
    { label: 'Rejected Listings', value: fmt(realStats.rejectedListings), icon: <Icons.X /> },
  ];

  return (
    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 animate-fadeIn">
      <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
        <div>
          <h1 className="font-display text-3xl font-bold text-ink-0 dark:text-surface-1">Admin Dashboard</h1>
          <p className="text-ink-4 dark:text-surface-4 mt-1">Platform management & analytics</p>
        </div>
        <div className="flex items-center gap-2 text-sm text-ink-4 dark:text-surface-4">
          {statsLoading ? 'Loading live data…' : `Data as of ${new Date().toLocaleTimeString()}`}
        </div>
      </div>

      {/* Tabs */}
      <div className="flex gap-1 p-1 bg-surface-2/50 dark:bg-ink-1/50 rounded-xl mb-8 overflow-x-auto">
        {tabs.map(tab => (
          <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap transition-all flex items-center gap-1.5 ${activeTab === tab ? 'bg-surface-0 dark:bg-ink-1 text-ink-0 dark:text-surface-1 shadow-sm' : 'text-ink-4 dark:text-surface-4 hover:text-ink-0 dark:hover:text-surface-2'}`}>
            {(tab === 'categories' || tab === 'site-settings') && <span className="text-xs">🔒</span>}
            {tab === 'site-settings' ? 'Site Settings' : tab.charAt(0).toUpperCase() + tab.slice(1)}
            {tab === 'reports' && reports.filter(r => r.status === 'open').length > 0 && (
              <span className="w-4 h-4 bg-red-500 text-white text-[9px] font-bold rounded-full flex items-center justify-center">{reports.filter(r => r.status === 'open').length}</span>
            )}
          </button>
        ))}
      </div>

      {activeTab === 'overview' && (
        <div className="animate-fadeIn">
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            {adminStats.map((s, i) => (
              <div key={s.label} className={`animate-fadeInUp delay-${i + 1} bg-surface-0 dark:bg-ink-1 rounded-2xl border border-ink-0/5 dark:border-surface-1/5 p-5`}>
                <div className="flex items-center justify-between mb-3">
                  <span className="text-ink-4 dark:text-surface-4">{s.icon}</span>
                </div>
                <p className="font-display text-2xl font-bold text-ink-0 dark:text-surface-1">{s.value}</p>
                <p className="text-sm text-ink-4 dark:text-surface-4 mt-0.5">{s.label}</p>
              </div>
            ))}
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            {/* Recent Users */}
            <div className="bg-surface-0 dark:bg-ink-1 rounded-2xl border border-ink-0/5 dark:border-surface-1/5 overflow-hidden">
              <div className="p-5 border-b border-ink-0/5 dark:border-surface-1/5">
                <h3 className="font-semibold">Recent Users</h3>
              </div>
              <div className="divide-y divide-ink-0/5 dark:divide-surface-1/5">
                {statsLoading ? (
                  <p className="p-4 text-sm text-ink-4 dark:text-surface-4">Loading...</p>
                ) : recentUsers.length === 0 ? (
                  <p className="p-4 text-sm text-ink-4 dark:text-surface-4">No users yet.</p>
                ) : recentUsers.map(u => (
                  <div key={u.uid} className="flex items-center gap-3 p-4">

                    <div className="flex-1 min-w-0">

                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Pending Listings */}
            <div className="bg-surface-0 dark:bg-ink-1 rounded-2xl border border-ink-0/5 dark:border-surface-1/5 overflow-hidden">
              <div className="p-5 border-b border-ink-0/5 dark:border-surface-1/5">

            <p className="p-10 text-sm text-ink-4 dark:text-surface-4 text-center">No reports yet. 🎉</p>
          ) : (
            <div className="divide-y divide-ink-0/5 dark:divide-surface-1/5">
              {reports.map(r => (
                <div key={r.id} className="flex items-start gap-4 p-4">
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 flex-wrap">
                      <p className="font-medium text-sm">{r.listingTitle || 'Untitled listing'}</p>
                      <span className={`text-[10px] font-semibold px-2 py-0.5 rounded-full capitalize ${r.status === 'open' ? 'bg-red-50 dark:bg-red-950/30 text-red-600' : r.status === 'resolved' ? 'bg-green-50 dark:bg-green-950/30 text-green-600' : 'bg-surface-2 dark:bg-ink-2 text-ink-4 dark:text-surface-4'}`}>{r.status}</span>
                    </div>
                    <p className="text-xs text-ink-4 dark:text-surface-4 mt-1 capitalize">Reason: {r.reason} • Reported by {r.reporterName || 'User'} {r.sellerName ? `• Seller: ${r.sellerName}` : ''}</p>
                    {r.details && <p className="text-xs text-ink-5 mt-1">{r.details}</p>}
                    <p className="text-[10px] text-ink-5 mt-1">{timeAgo(r.createdAt)}</p>
                  </div>
                  <div className="flex items-center gap-2 flex-shrink-0">
                    {r.listingId && (
                      <button
                        onClick={() => {
                          const full = listings.find(x => x.id === r.listingId) || pendingListings.find(x => x.id === r.listingId);
                          if (full) navigate('listing', { listing: full });
                          else addToast('That listing is no longer available', 'error');
                        }}
                        className="px-3 py-1.5 text-xs font-medium rounded-lg border border-ink-0/10 dark:border-surface-1/10 hover:bg-surface-2/50 dark:hover:bg-ink-2/50"
                      >View</button>
                    )}
                    {r.status === 'open' && (
                      <>
                        <button onClick={() => handleResolveReport(r.id, 'resolved')} className="px-3 py-1.5 text-xs font-semibold rounded-lg bg-green-50 dark:bg-green-950/30 text-green-600 hover:bg-green-100">Resolve</button>
                        <button onClick={() => handleResolveReport(r.id, 'dismissed')} className="px-3 py-1.5 text-xs font-semibold rounded-lg bg-surface-2 dark:bg-ink-2 text-ink-4 dark:text-surface-4 hover:bg-surface-3">Dismiss</button>
                      </>
                    )}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {activeTab === 'categories' && (
        <SuperAdminGate label="Categories">
          <CategoriesManager />
        </SuperAdminGate>
      )}

      {activeTab === 'site-settings' && (
        <SuperAdminGate label="Site Settings">
          <SiteSettingsManager />
          <OwnerPasswordManager />
        </SuperAdminGate>
      )}
    </div>
  );
}
