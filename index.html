function initFirebase(cfg) {
  if (fbApp) { try { fbApp.delete(); } catch {} fbApp = null; }
  fbApp = firebase.initializeApp(cfg);
  fbAuth = firebase.auth();
  fbDb = firebase.firestore();
  localStorage.setItem('mh_firebase_cfg', JSON.stringify(cfg));
}

function isFirebaseReady() { return !!fbApp; }

function resetFirebase() {
  if (fbApp) { try { fbApp.delete(); } catch {} }
  fbApp = null; fbAuth = null; fbDb = null;
  localStorage.removeItem('mh_firebase_cfg');
}

// Auth helpers
async function fbSignUp(email, password, displayName) {
  const cred = await fbAuth.createUserWithEmailAndPassword(email, password);
  await cred.user.updateProfile({ displayName });
  await fbDb.collection('users').doc(cred.user.uid).set({
    uid: cred.user.uid, username: displayName, email, avatar: '', role: 'USER',
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });
  return cred.user;
}

async function fbLogin(email, password) {
  const cred = await fbAuth.signInWithEmailAndPassword(email, password);
  return cred.user;
}

async function fbLogout() { await fbAuth.signOut(); }

async function fbGetUser(uid) {
  const doc = await fbDb.collection('users').doc(uid).get();
  return doc.exists ? doc.data() : null;
}

async function fbUpdateUser(uid, data) {
  await fbDb.collection('users').doc(uid).update(data);
}

// Listings CRUD
async function fbCreateListing(data) {
  const ref = await fbDb.collection('listings').add({
    ...data,
    userId: fbAuth.currentUser.uid,
    sellerName: fbAuth.currentUser.displayName || 'User',
    views: 0, favorites: 0, featured: false,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });
  return ref.id;
}

async function fbGetListings(filters = {}) {
  let q = fbDb.collection('listings').orderBy('createdAt', 'desc');
  if (filters.category) q = q.where('category', '==', filters.category);
  if (filters.userId) q = q.where('userId', '==', filters.userId);
  const snap = await q.limit(50).get();
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

async function fbGetListing(id) {
  const doc = await fbDb.collection('listings').doc(id).get();
  return doc.exists ? { id: doc.id, ...doc.data() } : null;
}

async function fbDeleteListing(id) {
  await fbDb.collection('listings').doc(id).delete();
}

async function fbUpdateListing(id, data) {
  await fbDb.collection('listings').doc(id).update(data);
}

async function fbIncrementViews(id) {
  await fbDb.collection('listings').doc(id).update({
    views: firebase.firestore.FieldValue.increment(1)
  });
}

// Favorites
async function fbToggleFavorite(userId, listingId) {
  const favId = `${userId}_${listingId}`;
  const ref = fbDb.collection('favorites').doc(favId);
  const doc = await ref.get();
  if (doc.exists) {
    await ref.delete();
    await fbDb.collection('listings').doc(listingId).update({ favorites: firebase.firestore.FieldValue.increment(-1) });
    return false;
  } else {
    await ref.set({ userId, listingId, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
    await fbDb.collection('listings').doc(listingId).update({ favorites: firebase.firestore.FieldValue.increment(1) });
    return true;
  }
}

async function fbGetFavorites(userId) {
  const snap = await fbDb.collection('favorites').where('userId', '==', userId).get();
  return snap.docs.map(d => d.data().listingId);
}

// Messages
async function fbSendMessage(fromUid, toUid, fromName, text, listingId) {
  const convId = [fromUid, toUid].sort().join('_');
  const msgRef = await fbDb.collection('conversations').doc(convId)
    .collection('messages').add({
      from: fromUid, fromName, text, listingId: listingId || null,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  await fbDb.collection('conversations').doc(convId).set({
    participants: [fromUid, toUid],
    lastMessage: text, lastMessageAt: firebase.firestore.FieldValue.serverTimestamp(),
    participantsNames: { [fromUid]: fromName }
  }, { merge: true });
  return msgRef.id;
}

async function fbGetConversations(uid) {
  const snap = await fbDb.collection('conversations')
    .where('participants', 'array-contains', uid)
    .orderBy('lastMessageAt', 'desc').limit(20).get();
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

async function fbGetMessages(convId) {
  const snap = await fbDb.collection('conversations').doc(convId)
    .collection('messages').orderBy('createdAt', 'asc').limit(100).get();
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

    e.preventDefault();
    setLoading(true); setError('');
    try {
      if (!config.apiKey || !config.authDomain || !config.projectId || !config.appId) {
        throw new Error('All fields are required');
      }
      initFirebase(config);
      // Enable email/password auth
      // Verify connection
      await fbAuth.signInAnonymously().catch(() => {});
      await fbAuth.signOut();
      window.location.reload();
    } catch (err) {
      setError(err.message || 'Failed to connect. Check your config.');
      resetFirebase();
      setLoading(false);
    }
  };

  const handlePaste = async () => {
    try {
      const text = await navigator.clipboard.readText();
      const match = text.match(/firebaseConfig\s*=\s*(\{[\s\S]*?\})/);
      if (match) {
        const cfg = JSON.parse(match[1].replace(/'/g, '"'));
        setConfig({ apiKey: cfg.apiKey||'', authDomain: cfg.authDomain||'', projectId: cfg.projectId||'', messagingSenderId: cfg.messagingSenderId||'', appId: cfg.appId||'' });
      } else {
        const cfg = JSON.parse(text.replace(/'/g, '"'));
        setConfig({ apiKey: cfg.apiKey||'', authDomain: cfg.authDomain||'', projectId: cfg.projectId||'', messagingSenderId: cfg.messagingSenderId||'', appId: cfg.appId||'' });
      }
    } catch { setError('Could not parse clipboard content. Paste manually.'); }
  };

  return (
    <div className="min-h-screen flex items-center justify-center p-4 bg-surface-1 dark:bg-ink-0">
      <div className="w-full max-w-lg animate-fadeInUp">
        <div className="text-center mb-8">

          </div>
          <h1 className="font-display text-3xl font-bold text-ink-0 dark:text-surface-1">Connect Firebase</h1>
          <p className="text-ink-4 dark:text-surface-4 mt-2">Enter your Firebase project credentials to get started</p>
        </div>
        <div className="bg-surface-0 dark:bg-ink-1 rounded-2xl border border-ink-0/5 dark:border-surface-1/5 p-6">

            {['apiKey','authDomain','projectId','appId'].map(field => (

                <label className="block text-sm font-medium mb-1.5 text-ink-0 dark:text-surface-1 capitalize">{field.replace(/([A-Z])/g, ' $1')}</label>

                  placeholder={`Your ${field}`}
                  className="w-full px-4 py-2.5 rounded-xl border border-ink-0/10 dark:border-surface-1/10 bg-surface-1 dark:bg-ink-2 outline-none focus:border-brand-400 text-sm font-mono" />
              </div>

// ==================== CONTEXT ====================
const AppContext = createContext();

function AppProvider({ children }) {
  const [theme, setTheme] = useState(() => localStorage.getItem('mh-theme') || 'light');
  const [currentPage, setCurrentPage] = useState('home');
  const [selectedCategory, setSelectedCategory] = useState(null);
  const [selectedListing, setSelectedListing] = useState(null);
  const [searchQuery, setSearchQuery] = useState('');
  const [toasts, setToasts] = useState([]);
  const [savedListings, setSavedListings] = useState([]);
  const [isLoggedIn, setIsLoggedIn] = useState(false);
  const [currentUser, setCurrentUser] = useState(null);
  const [fbReady, setFbReady] = useState(false);
  const [listings, setListings] = useState([]);
  const [listingsLoading, setListingsLoading] = useState(false);
  const [messages, setMessages] = useState([]);
  const [chatMessages, setChatMessages] = useState([]);
  const [activeConvId, setActiveConvId] = useState(null);

  // Apply theme on mount
  useEffect(() => {
    document.documentElement.classList.toggle('dark', theme === 'dark');
  }, []);

  // Initialize Firebase from stored config
  useEffect(() => {
    const cfg = getStoredConfig();
    if (cfg) {
      try { initFirebase(cfg); setFbReady(true); } catch(e) { console.error('Firebase init failed', e); setFbReady(false); }
    }
  }, []);

  // Auth state listener
  useEffect(() => {
    if (!isFirebaseReady()) return;
    const unsub = fbAuth.onAuthStateChanged(async (user) => {
      if (user) {
        setIsLoggedIn(true);
        const userData = await fbGetUser(user.uid);
        setCurrentUser({
          uid: user.uid,
          name: user.displayName || userData?.username || 'User',
          email: user.email,
          avatar: userData?.avatar || `https://i.pravatar.cc/80?u=${user.uid}`,
          role: userData?.role || 'USER'
        });
        // Load saved listings
        const favs = await fbGetFavorites(user.uid);
        setSavedListings(favs);
        // Load conversations
        const convs = await fbGetConversations(user.uid);
        setMessages(convs.map(c => ({
          id: c.id, from: c.participants.find(p => p !== user.uid) || 'unknown',
          avatar: `https://i.pravatar.cc/40?u=${c.participants.find(p => p !== user.uid)}`,
          lastMessage: c.lastMessage, time: c.lastMessageAt?.toDate?.()?.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) || 'Recently',
          unread: 0, online: false
        })));
      } else {
        setIsLoggedIn(false);
        setCurrentUser(null);
        setSavedListings([]);
      }
    });
    return () => unsub();
  }, [fbReady]);

  // Load all listings from Firestore
  const reloadListings = useCallback(async () => {
    if (!isFirebaseReady()) return;
    setListingsLoading(true);
    try {
      const data = await fbGetListings();
      setListings(data);
    } catch(e) { console.error('Failed to load listings', e); }
    setListingsLoading(false);
  }, []);

  useEffect(() => { if (fbReady) reloadListings(); }, [fbReady, reloadListings]);

  const toggleTheme = () => {
    setTheme(t => {
      const next = t === 'light' ? 'dark' : 'light';
      document.documentElement.classList.toggle('dark', next === 'dark');
      localStorage.setItem('mh-theme', next);
      return next;
    });
  };

  const addToast = useCallback((message, type = 'success') => {
    const id = Date.now();
    setToasts(prev => [...prev, { id, message, type }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3500);
  }, []);

  const toggleSave = useCallback(async (listingId) => {
    if (!isFirebaseReady() || !currentUser?.uid) { addToast('Please log in to save listings', 'error'); return; }
    try {
      const saved = await fbToggleFavorite(currentUser.uid, String(listingId));
      setSavedListings(prev => saved ? [...prev, listingId] : prev.filter(id => id !== listingId));
      addToast(saved ? 'Saved to your listings' : 'Removed from saved listings');
    } catch(e) { addToast('Failed to update favorites', 'error'); }
  }, [currentUser, addToast]);

  const navigate = useCallback((page, data = {}) => {
    setCurrentPage(page);
    if (data.category) setSelectedCategory(data.category);
    if (data.listing) {
      setSelectedListing(data.listing);
      if (isFirebaseReady() && data.listing.id) fbIncrementViews(data.listing.id).catch(()=>{});
    }
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, []);

  const handleLogout = useCallback(async () => {
    if (isFirebaseReady()) await fbLogout();
    setIsLoggedIn(false); setCurrentUser(null); setSavedListings([]); setMessages([]);
    addToast('Logged out successfully');
  }, [addToast]);

  return (
    <AppContext.Provider value={{
      theme, toggleTheme, currentPage, navigate, selectedCategory, setSelectedCategory,
      selectedListing, setSelectedListing, searchQuery, setSearchQuery, toasts,
      savedListings, toggleSave, isLoggedIn, setIsLoggedIn, currentUser, setCurrentUser,
      addToast, messages, setMessages, chatMessages, setChatMessages,
      listings, listingsLoading, reloadListings, activeConvId, setActiveConvId,
      handleLogout, fbReady
    }}>
      {children}
    </AppContext.Provider>
  );
}

function useApp() { return useContext(AppContext); }

// ==================== BROWSE PAGE ====================
function BrowsePage() {
  const { navigate, selectedCategory, setSelectedCategory, searchQuery, setSearchQuery, listings } = useApp();
  const [priceRange, setPriceRange] = useState([0, 100000]);
  const [sortBy, setSortBy] = useState('newest');
  const [viewMode, setViewMode] = useState('grid');
  const [filtersOpen, setFiltersOpen] = useState(false);

  const allListings = listings.length > 0 ? listings : LISTINGS;

  const filtered = useMemo(() => {
    let list = [...allListings];
    if (selectedCategory) list = list.filter(l => l.category === selectedCategory);
    if (searchQuery) list = list.filter(l => (l.title||'').toLowerCase().includes(searchQuery.toLowerCase()) || (l.seller||l.sellerName||'').toLowerCase().includes(searchQuery.toLowerCase()));
    list = list.filter(l => l.price >= priceRange[0] && l.price <= priceRange[1]);
    if (sortBy === 'price-low') list.sort((a, b) => a.price - b.price);
    else if (sortBy === 'price-high') list.sort((a, b) => b.price - a.price);
    else if (sortBy === 'popular') list.sort((a, b) => b.views - a.views);
    return list;
  }, [selectedCategory, searchQuery, priceRange, sortBy, allListings]);

  const activeCategory = CATEGORIES.find(c => c.id === selectedCategory);

  return (
    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      {/* Breadcrumb */}
      <div className="flex items-center gap-2 text-sm text-ink-4 dark:text-surface-4 mb-6 animate-fadeIn">
        <button onClick={() => { setSelectedCategory(null); navigate('home'); }} className="hover:text-brand-500 transition-colors">Home</button>
        <Icons.ChevronRight />
        <span className="text-ink-1 dark:text-surface-2 font-medium">{activeCategory ? activeCategory.name : searchQuery ? `Search: "${searchQuery}"` : 'All Categories'}</span>
      </div>

      {/* Header */}
      <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8 animate-fadeInUp">
        <div>
          <h1 className="font-display text-3xl sm:text-4xl font-bold text-ink-0 dark:text-surface-1">
            {activeCategory ? activeCategory.name : searchQuery ? 'Search Results' : 'Browse All'}
          </h1>
          <p className="text-ink-4 dark:text-surface-4 mt-1">{filtered.length} listings found</p>
        </div>
        <div className="flex items-center gap-3">
          <button onClick={() => setFiltersOpen(!filtersOpen)} className="flex items-center gap-2 px-4 py-2.5 rounded-xl border border-ink-0/10 dark:border-surface-1/10 text-sm font-medium hover:border-brand-300 dark:hover:border-brand-700 transition-colors">
            <Icons.Filter /> Filters
          </button>
          <select value={sortBy} onChange={e => setSortBy(e.target.value)} className="px-4 py-2.5 rounded-xl border border-ink-0/10 dark:border-surface-1/10 bg-surface-0 dark:bg-ink-1 text-sm font-medium outline-none appearance-none cursor-pointer">
            <option value="newest">Newest First</option>
            <option value="price-low">Price: Low to High</option>
            <option value="price-high">Price: High to Low</option>
            <option value="popular">Most Popular</option>
          </select>
          <div className="hidden sm:flex items-center gap-1 p-1 rounded-xl border border-ink-0/10 dark:border-surface-1/10">
            <button onClick={() => setViewMode('grid')} className={`p-2 rounded-lg ${viewMode === 'grid' ? 'bg-brand-500 text-white' : 'text-ink-4 hover:text-ink-1'}`}><Icons.Grid /></button>
            <button onClick={() => setViewMode('list')} className={`p-2 rounded-lg ${viewMode === 'list' ? 'bg-brand-500 text-white' : 'text-ink-4 hover:text-ink-1'}`}><Icons.List /></button>
          </div>
        </div>
      </div>

      <div className="flex gap-8">
        {/* Sidebar Filters */}
        <aside className={`${filtersOpen ? 'fixed inset-0 z-50 bg-surface-0 dark:bg-ink-0 p-6 overflow-y-auto' : 'hidden'} lg:relative lg:block lg:p-0 w-full lg:w-64 flex-shrink-0`}>

// ==================== CREATE LISTING ====================
function CreateListingPage() {
  const { navigate, addToast, isLoggedIn, currentUser, reloadListings } = useApp();
  const [images, setImages] = useState([]);
  const [imageFiles, setImageFiles] = useState([]);
  const [dragOver, setDragOver] = useState(false);
  const [form, setForm] = useState({ title: '', description: '', price: '', category: '', location: '', tags: '', contact: 'email' });
  const [step, setStep] = useState(1);
  const [publishing, setPublishing] = useState(false);

  if (!isLoggedIn) {
    return (
      <div className="max-w-md mx-auto px-4 py-20 text-center animate-fadeIn">
        <div className="text-6xl mb-4">🔐</div>
        <h2 className="font-display text-2xl font-bold mb-2">Sign in to create a listing</h2>
        <p className="text-ink-4 dark:text-surface-4 mb-6">You need an account to sell on MarketHub</p>
        <div className="flex gap-3 justify-center">
          <button onClick={() => navigate('login')} className="px-6 py-2.5 bg-brand-500 text-white font-semibold rounded-xl">Log In</button>
          <button onClick={() => navigate('register')} className="px-6 py-2.5 border border-ink-0/10 dark:border-surface-1/10 font-semibold rounded-xl">Sign Up</button>
        </div>
      </div>
    );
  }

  const handleDrop = (e) => {
    e.preventDefault(); setDragOver(false);
    const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
    addImages(files);
  };
  const addImages = (files) => {
    const urls = files.map(f => URL.createObjectURL(f));
    setImages(prev => [...prev, ...urls].slice(0, 8));
    setImageFiles(prev => [...prev, ...files].slice(0, 8));
  };
  const removeImage = (i) => setImages(prev => prev.filter((_, idx) => idx !== i));

  const handleSubmit = async () => {
    if (!form.title || !form.price || !form.category) { addToast('Please fill in required fields', 'error'); return; }
    setPublishing(true);
    try {
      // For images, we'll use the first object URL as the cover image
      // In production, you'd upload to Firebase Storage and get URLs back
      const coverImage = images.length > 0 ? images[0] : 'https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?w=600&h=400&fit=crop';
      await fbCreateListing({
        title: form.title,
        description: form.description,
        price: Number(form.price),
        category: form.category,
        location: form.location || 'Unknown',
        image: coverImage,
        images: images,
        condition: 'Brand New',
        tags: form.tags ? form.tags.split(',').map(t => t.trim()) : [],
        contact: form.contact,
        rating: 5.0,
        verified: true,
        posted: 'Just now'
      });
      await reloadListings();
      addToast('Listing published successfully!');
      navigate('seller-dashboard');
    } catch(e) {
      console.error(e);
      addToast('Failed to publish listing. Check your Firestore rules.', 'error');
    }
    setPublishing(false);
  };

  return (
    <div className="max-w-3xl mx-auto px-4 sm:px-6 py-8 animate-fadeIn">
      <h1 className="font-display text-3xl font-bold text-ink-0 dark:text-surface-1 mb-2">Create a Listing</h1>
      <p className="text-ink-4 dark:text-surface-4 mb-8">Fill in the details to post your item or service</p>

      {/* Progress Steps */}
      <div className="flex items-center gap-2 mb-10">
        {[1,2,3].map(s => (
          <div key={s} className="flex items-center gap-2 flex-1">
            <button onClick={() => setStep(s)} className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold transition-all ${step >= s ? 'bg-brand-500 text-white' : 'bg-surface-2 dark:bg-ink-2 text-ink-4 dark:text-surface-4'}`}>{s}</button>
            {s < 3 && <div className={`flex-1 h-0.5 rounded-full transition-all ${step > s ? 'bg-brand-500' : 'bg-surface-2 dark:bg-ink-2'}`} />}
          </div>
        ))}
      </div>

      {step === 1 && (
        <div className="animate-fadeIn space-y-6">
          {/* Image Upload */}
          <div>
            <label className="block font-semibold text-sm mb-2">Photos <span className="text-ink-4 dark:text-surface-4 font-normal">(up to 8)</span></label>
            <div
              onDragOver={e => { e.preventDefault(); setDragOver(true); }}
              onDragLeave={() => setDragOver(false)}
              onDrop={handleDrop}
              className={`border-2 border-dashed rounded-2xl p-8 text-center transition-all cursor-pointer ${dragOver ? 'drop-zone-active border-brand-400 bg-brand-50 dark:bg-brand-950/10' : 'border-ink-0/10 dark:border-surface-1/10 hover:border-brand-300 dark:hover:border-brand-700'}`}
              onClick={() => document.getElementById('fileInput').click()}
            >
              <input id="fileInput" type="file" multiple accept="image/*" className="hidden" onChange={e => addImages(Array.from(e.target.files))} />
              <div className="flex flex-col items-center">
                <div className="w-16 h-16 rounded-2xl bg-brand-50 dark:bg-brand-950/30 flex items-center justify-center mb-4 text-brand-500">
                  <Icons.Upload />
                </div>
                <p className="font-semibold text-ink-0 dark:text-surface-1 mb-1">Drop images here or click to browse</p>
                <p className="text-sm text-ink-4 dark:text-surface-4">PNG, JPG, WEBP up to 10MB each</p>
              </div>
            </div>
            {images.length > 0 && (
              <div className="grid grid-cols-4 gap-2 mt-4">
                {images.map((img, i) => (
                  <div key={i} className="relative aspect-square rounded-xl overflow-hidden group">
                    <img src={img} alt="" className="w-full h-full object-cover" />
                    <button onClick={() => removeImage(i)} className="absolute top-1 right-1 w-6 h-6 bg-ink-0/70 text-white rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity text-xs">✕</button>
                    {i === 0 && <div className="absolute bottom-1 left-1 px-2 py-0.5 bg-brand-500 text-white text-[10px] font-bold rounded">COVER</div>}
                  </div>
                ))}

          </div>

          <div>

          </div>
          <button onClick={() => setStep(2)} className="w-full py-3 bg-gradient-to-r from-brand-500 to-brand-600 text-white font-semibold rounded-xl hover:from-brand-600 hover:to-brand-700 transition-all">Next Step</button>

function LoginPage() {

    e.preventDefault();

    try {
      await fbLogin(email, password);
      addToast('Welcome back! You are now logged in.');
      navigate('home');
    } catch (err) {
      const msg = err.code === 'auth/invalid-credential' ? 'Invalid email or password'
        : err.code === 'auth/user-not-found' ? 'No account with this email'

  return (

// ==================== MESSAGES ====================
function MessagesPage() {
  const { messages, setMessages, chatMessages, setChatMessages, isLoggedIn, navigate, addToast, currentUser, activeConvId, setActiveConvId } = useApp();
  const [newMsg, setNewMsg] = useState('');
  const [typing, setTyping] = useState(false);
  const messagesEndRef = useRef(null);

  if (!isLoggedIn) {
    return (
      <div className="max-w-md mx-auto px-4 py-20 text-center animate-fadeIn">
        <div className="text-6xl mb-4">💬</div>
        <h2 className="font-display text-2xl font-bold mb-2">Sign in to access messages</h2>
        <p className="text-ink-4 dark:text-surface-4 mb-6">Connect with buyers and sellers</p>
        <button onClick={() => navigate('login')} className="px-6 py-2.5 bg-brand-500 text-white font-semibold rounded-xl">Log In</button>
      </div>
    );
  }

  const activeConv = messages.find(m => m.id === activeConvId);

  // Load messages when active conversation changes
  useEffect(() => {
    if (!activeConvId) { setChatMessages([]); return; }
    (async () => {
      try {
        const msgs = await fbGetMessages(activeConvId);
        setChatMessages(msgs.map(m => ({
          id: m.id,
          sender: m.from === currentUser?.uid ? 'me' : 'them',
          text: m.text,
          time: m.createdAt?.toDate?.()?.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) || ''
        })));
      } catch(e) { console.error(e); }
    })();
  }, [activeConvId]);

  // Auto-scroll
  useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [chatMessages]);

  const sendMessage = async () => {
    if (!newMsg.trim() || !activeConvId) return;
    setNewMsg('');
    try {
      // activeConvId is the conv document ID; from needs the other user's UID
      const otherUid = activeConv?.from || activeConvId.split('_').find(p => p !== currentUser?.uid);
      await fbSendMessage(currentUser.uid, otherUid, currentUser.name, newMsg, null);
      // Refresh messages
      const msgs = await fbGetMessages(activeConvId);
      setChatMessages(msgs.map(m => ({
        id: m.id, sender: m.from === currentUser.uid ? 'me' : 'them',
        text: m.text, time: m.createdAt?.toDate?.()?.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) || ''
      })));
    } catch(e) { addToast('Failed to send message', 'error'); }
  };

  return (
    <div className="max-w-6xl mx-auto px-4 sm:px-6 py-8 animate-fadeIn">      <h1 className="font-display text-3xl font-bold text-ink-0 dark:text-surface-1 mb-6">Messages</h1>
      <div className="flex gap-4 h-[calc(100vh-200px)] min-h-[500px]">
        {/* Conversation List */}
        <div className={`${activeConvId ? 'hidden md:flex' : 'flex'} flex-col w-full md:w-80 flex-shrink-0 bg-surface-0 dark:bg-ink-1 rounded-2xl border border-ink-0/5 dark:border-surface-1/5 overflow-hidden`}>
          <div className="p-4 border-b border-ink-0/5 dark:border-surface-1/5">
            <input type="text" placeholder="Search conversations..." className="w-full px-3 py-2 rounded-xl bg-surface-2/50 dark:bg-ink-2/50 border-none outline-none text-sm" />
          </div>
          <div className="flex-1 overflow-y-auto">
            {messages.map(m => (
              <button key={m.id} onClick={() => { setActiveConvId(m.id); setMessages(prev => prev.map(x => x.id === m.id ? {...x, unread: 0} : x)); }}
                className={`w-full flex items-center gap-3 p-4 hover:bg-surface-2/50 dark:hover:bg-ink-2/50 transition-colors border-b border-ink-0/5 dark:border-surface-1/5 text-left ${activeConvId === m.id ? 'bg-brand-50/50 dark:bg-brand-950/10' : ''}`}>
                <div className="relative flex-shrink-0">
                  <img src={m.avatar} alt={m.from} className="w-11 h-11 rounded-full object-cover" />
                  {m.online && <div className="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-surface-0 dark:border-ink-1" />}
                </div>
                <div className="flex-1 min-w-0">
                  <div className="flex justify-between items-center">
                    <p className="font-semibold text-sm truncate">{m.from}</p>
                    <span className="text-[10px] text-ink-5 flex-shrink-0">{m.time}</span>
                  </div>
                  <p className="text-xs text-ink-4 dark:text-surface-4 truncate mt-0.5">{m.lastMessage}</p>
                </div>
                {m.unread > 0 && <span className="w-5 h-5 bg-brand-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center flex-shrink-0">{m.unread}</span>}
              </button>
            ))}
          </div>
        </div>

        {/* Chat Area */}
        <div className={`${activeConvId ? 'flex' : 'hidden md:flex'} flex-col flex-1 bg-surface-0 dark:bg-ink-1 rounded-2xl border border-ink-0/5 dark:border-surface-1/5 overflow-hidden`}>
          {activeConv ? (
            <>
              {/* Chat Header */}
              <div className="flex items-center gap-3 p-4 border-b border-ink-0/5 dark:border-surface-1/5">
                <button onClick={() => setActiveConvId(null)} className="md:hidden text-ink-4"><Icons.ArrowLeft /></button>
                <img src={activeConv.avatar} alt="" className="w-9 h-9 rounded-full object-cover" />
                <div className="flex-1">
                  <p className="font-semibold text-sm">{activeConv.from}</p>
                  <p className="text-[10px] text-green-500">{activeConv.online ? 'Online' : 'Offline'}</p>
                </div>
              </div>

              {/* Messages */}
              <div className="flex-1 overflow-y-auto p-4 space-y-3">
                {chatMessages.map(msg => (
                  <div key={msg.id} className={`flex ${msg.sender === 'me' ? 'justify-end' : 'justify-start'}`}>
                    <div className={`max-w-[75%] px-4 py-2.5 ${msg.sender === 'me' ? 'chat-bubble-sent bg-brand-500 text-white' : 'chat-bubble-received bg-surface-2 dark:bg-ink-2 text-ink-0 dark:text-surface-2'}`}>
                      <p className="text-sm">{msg.text}</p>
                      <p className={`text-[10px] mt-1 ${msg.sender === 'me' ? 'text-white/60' : 'text-ink-4 dark:text-surface-4'}`}>{msg.time} {msg.sender === 'me' && '✓✓'}</p>
                    </div>
                  </div>
                ))}
                {typing && (
                  <div className="flex justify-start">
                    <div className="chat-bubble-received bg-surface-2 dark:bg-ink-2 px-4 py-3">
                      <div className="flex gap-1.5">
                        <div className="w-2 h-2 bg-ink-4 dark:bg-surface-4 rounded-full animate-bounce" style={{animationDelay:'0ms'}} />
                        <div className="w-2 h-2 bg-ink-4 dark:bg-surface-4 rounded-full animate-bounce" style={{animationDelay:'150ms'}} />
                        <div className="w-2 h-2 bg-ink-4 dark:bg-surface-4 rounded-full animate-bounce" style={{animationDelay:'300ms'}} />
                      </div>
                    </div>
                  </div>
                )}
                <div ref={messagesEndRef} />
              </div>

              {/* Input */}
              <div className="p-4 border-t border-ink-0/5 dark:border-surface-1/5">
                <div className="flex items-center gap-2">
                  <button className="p-2 text-ink-4 dark:text-surface-4 hover:text-brand-500"><Icons.Image /></button>
                  <input
                    type="text"
                    value={newMsg}
                    onChange={e => setNewMsg(e.target.value)}
                    onKeyDown={e => e.key === 'Enter' && sendMessage()}
                    placeholder="Type a message..."
                    className="flex-1 px-4 py-2.5 rounded-xl bg-surface-2/50 dark:bg-ink-2/50 border-none outline-none text-sm"
                  />
                  <button onClick={sendMessage} className="p-2.5 bg-brand-500 text-white rounded-xl hover:bg-brand-600 transition-colors"><Icons.Send /></button>
                </div>
              </div>
            </>
          ) : (
            <div className="flex-1 flex items-center justify-center text-center p-8">
              <div>
                <div className="text-5xl mb-4">💬</div>
                <h3 className="font-display text-xl font-bold text-ink-0 dark:text-surface-1 mb-2">Select a conversation</h3>
                <p className="text-sm text-ink-4 dark:text-surface-4">Choose from your existing conversations or start a new one</p>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function SearchPage() {
  const { searchQuery, setSearchQuery, navigate, listings } = useApp();
  const [localQuery, setLocalQuery] = useState(searchQuery);
  const allListings = listings.length > 0 ? listings : LISTINGS;

  const results = useMemo(() => {
    if (!searchQuery) return allListings.slice(0, 8);
    return allListings.filter(l =>
      (l.title||'').toLowerCase().includes(searchQuery.toLowerCase()) ||
      (l.seller||l.sellerName||'').toLowerCase().includes(searchQuery.toLowerCase()) ||
      (l.category||'').toLowerCase().includes(searchQuery.toLowerCase()) ||
      (l.location||'').toLowerCase().includes(searchQuery.toLowerCase())
    );
  }, [searchQuery, allListings]);

  return (
    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 animate-fadeIn">
      {/* Search Bar */}
      <div className="max-w-2xl mx-auto mb-10">
        <div className="flex items-center gap-2 p-2 bg-surface-0 dark:bg-ink-1 rounded-2xl shadow-lg border border-ink-0/5 dark:border-surface-1/10">
          <div className="flex items-center gap-3 flex-1 px-4">
            <Icons.Search />
            <input
              type="text"
              value={localQuery}
              onChange={e => setLocalQuery(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter') setSearchQuery(localQuery); }}
              placeholder="Search listings, sellers, categories..."
              className="w-full py-3 bg-transparent border-none outline-none text-ink-0 dark:text-surface-1 placeholder:text-ink-5"
              autoFocus
            />
          </div>
          <button onClick={() => setSearchQuery(localQuery)} className="px-6 py-3 bg-brand-500 text-white font-semibold rounded-xl text-sm">Search</button>
        </div>
      </div>

      {searchQuery ? (
        <>
          <p className="text-ink-4 dark:text-surface-4 mb-6">{results.length} results for "<span className="text-ink-0 dark:text-surface-1 font-medium">{searchQuery}</span>"</p>

function SettingsPage() {
  const { isLoggedIn, navigate, addToast, theme, toggleTheme, currentUser, handleLogout } = useApp();
  const [name, setName] = useState(currentUser?.name || '');
  const [email, setEmail] = useState(currentUser?.email || '');
  const [bio, setBio] = useState('');
  const [lang, setLang] = useState('en');
  const [notifs, setNotifs] = useState({ email: true, push: true, marketing: false });
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    if (currentUser) { setName(currentUser.name || ''); setEmail(currentUser.email || ''); }
  }, [currentUser]);

  if (!isLoggedIn) { navigate('login'); return null; }

  const handleSave = async () => {
    setSaving(true);
    try {
      if (isFirebaseReady() && currentUser?.uid) {
        await fbUpdateUser(currentUser.uid, { username: name, bio });
        if (fbAuth.currentUser) await fbAuth.currentUser.updateProfile({ displayName: name });
      }
      addToast('Settings saved successfully!');
    } catch(e) { addToast('Failed to save settings', 'error'); }
    setSaving(false);
  };

  return (
    <div className="max-w-2xl mx-auto px-4 sm:px-6 py-8 animate-fadeIn">
      <h1 className="font-display text-3xl font-bold text-ink-0 dark:text-surface-1 mb-8">Settings</h1>

      <div className="space-y-6">
        {/* Profile */}
        <div className="bg-surface-0 dark:bg-ink-1 rounded-2xl border border-ink-0/5 dark:border-surface-1/5 p-6">
          <h3 className="font-semibold text-ink-0 dark:text-surface-1 mb-4">Profile Information</h3>
          <div className="space-y-4">
            <div>
              <label className="block text-sm font-medium mb-1.5">Full Name</label>
              <input type="text" value={name} onChange={e => setName(e.target.value)} className="w-full px-4 py-2.5 rounded-xl border border-ink-0/10 dark:border-surface-1/10 bg-surface-0 dark:bg-ink-2 outline-none focus:border-brand-400 text-sm" />
            </div>
            <div>
              <label className="block text-sm font-medium mb-1.5">Email</label>
              <input type="email" value={email} onChange={e => setEmail(e.target.value)} className="w-full px-4 py-2.5 rounded-xl border border-ink-0/10 dark:border-surface-1/10 bg-surface-0 dark:bg-ink-2 outline-none focus:border-brand-400 text-sm" />
            </div>
            <div>
              <label className="block text-sm font-medium mb-1.5">Bio</label>
              <textarea value={bio} onChange={e => setBio(e.target.value)} rows={3} className="w-full px-4 py-2.5 rounded-xl border border-ink-0/10 dark:border-surface-1/10 bg-surface-0 dark:bg-ink-2 outline-none focus:border-brand-400 text-sm resize-none" />
            </div>
          </div>
        </div>

        {/* Preferences */}
        <div className="bg-surface-0 dark:bg-ink-1 rounded-2xl border border-ink-0/5 dark:border-surface-1/5 p-6">
          <h3 className="font-semibold text-ink-0 dark:text-surface-1 mb-4">Preferences</h3>
          <div className="space-y-4">
            <div className="flex items-center justify-between">
              <div><p className="font-medium text-sm">Dark Mode</p><p className="text-xs text-ink-4 dark:text-surface-4">Toggle dark theme</p></div>
              <button onClick={toggleTheme} className={`w-12 h-6 rounded-full transition-all ${theme === 'dark' ? 'bg-brand-500' : 'bg-ink-0/10 dark:bg-surface-1/20'} relative`}>
                <span className={`absolute top-1 w-4 h-4 rounded-full bg-white shadow transition-all ${theme === 'dark' ? 'left-7' : 'left-1'}`} />
              </button>
            </div>
            <div className="flex items-center justify-between">
              <div><p className="font-medium text-sm">Language</p><p className="text-xs text-ink-4 dark:text-surface-4">Select interface language</p></div>
              <select value={lang} onChange={e => setLang(e.target.value)} className="px-3 py-1.5 rounded-lg border border-ink-0/10 dark:border-surface-1/10 bg-surface-0 dark:bg-ink-2 text-sm outline-none">
                <option value="en">English</option>
                <option value="fr">Français</option>
                <option value="ar">العربية</option>
              </select>
            </div>
          </div>
        </div>

        {/* Notifications */}
        <div className="bg-surface-0 dark:bg-ink-1 rounded-2xl border border-ink-0/5 dark:border-surface-1/5 p-6">
          <h3 className="font-semibold text-ink-0 dark:text-surface-1 mb-4">Notifications</h3>
          <div className="space-y-3">
            {[{key:'email',label:'Email Notifications',desc:'Receive updates via email'},{key:'push',label:'Push Notifications',desc:'Browser push notifications'},{key:'marketing',label:'Marketing Emails',desc:'Promotional offers and news'}].map(n => (
              <div key={n.key} className="flex items-center justify-between">
                <div><p className="font-medium text-sm">{n.label}</p><p className="text-xs text-ink-4 dark:text-surface-4">{n.desc}</p></div>
                <button onClick={() => setNotifs({...notifs, [n.key]: !notifs[n.key]})} className={`w-12 h-6 rounded-full transition-all ${notifs[n.key] ? 'bg-brand-500' : 'bg-ink-0/10 dark:bg-surface-1/20'} relative`}>
                  <span className={`absolute top-1 w-4 h-4 rounded-full bg-white shadow transition-all ${notifs[n.key] ? 'left-7' : 'left-1'}`} />
                </button>
              </div>
            ))}
          </div>
        </div>

        {/* Danger Zone */}
        <div className="bg-red-50/50 dark:bg-red-950/10 rounded-2xl border border-red-200/30 dark:border-red-800/20 p-6">
          <h3 className="font-semibold text-red-600 dark:text-red-400 mb-2">Danger Zone</h3>
          <p className="text-sm text-ink-4 dark:text-surface-4 mb-4">Once you delete your account, there is no going back.</p>
          <button className="px-4 py-2 border border-red-300 dark:border-red-700 text-red-600 dark:text-red-400 text-sm font-medium rounded-xl hover:bg-red-100 dark:hover:bg-red-950/30 transition-colors">Delete Account</button>
        </div>

        <button onClick={handleSave} disabled={saving} className="w-full py-3 bg-gradient-to-r from-brand-500 to-brand-600 text-white font-semibold rounded-xl hover:from-brand-600 hover:to-brand-700 transition-all shadow-lg shadow-brand-500/20 disabled:opacity-50">{saving ? 'Saving...' : 'Save Changes'}</button>
      </div>
    </div>
  );
}

      <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
        <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-8 mb-12">
          <div className="col-span-2 lg:col-span-1">
            <div className="flex items-center gap-2 mb-4">
              <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-brand-500 to-brand-700 flex items-center justify-center">
                <span className="text-white font-display font-bold text-base">M</span>
              </div>
              <span className="font-display font-bold text-lg text-surface-1">MarketHub</span>

            <p className="text-sm text-ink-5 leading-relaxed">The modern marketplace for buying, selling, and offering services across every niche.</p>
          </div>
          {[

          ].map(col => (
            <div key={col.title}>
              <h4 className="font-semibold text-sm text-surface-2 mb-4">{col.title}</h4>
              <ul className="space-y-2.5">
                {col.links.map(([page, label]) => (
                  <li key={label}><button onClick={() => navigate(page)} className="text-sm text-ink-5 hover:text-brand-400 transition-colors">{label}</button></li>
                ))}
              </ul>
            </div>
          ))}
          <div>
            <h4 className="font-semibold text-sm text-surface-2 mb-4">Language</h4>
            <div className="flex flex-col gap-2">
              {['English','Français','العربية'].map(lang => (
                <button key={lang} className="text-sm text-ink-5 hover:text-brand-400 transition-colors text-left">{lang}</button>

          </div>
        </div>
        <div className="border-t border-ink-0/10 dark:border-surface-1/5 pt-8 flex flex-col sm:flex-row justify-between items-center gap-4">
          <p className="text-sm text-ink-5">&copy; 2026 MarketHub. All rights reserved.</p>
          <div className="flex gap-6">
            {['Twitter','GitHub','LinkedIn'].map(s => (
              <button key={s} className="text-sm text-ink-5 hover:text-brand-400 transition-colors">{s}</button>
            ))}
          </div>
        </div>
      </div>
    </footer>
  );
}

// ==================== ROUTER ====================
function Router() {
  const { currentPage } = useApp();
  const pages = {
    'home': HomePage,
    'browse': BrowsePage,
    'listing': ListingDetailPage,
    'create': CreateListingPage,
    'login': LoginPage,
    'register': RegisterPage,
    'messages': MessagesPage,
    'search': SearchPage,
    'saved': SavedPage,
    'seller-dashboard': SellerDashboardPage,
    'admin': AdminDashboardPage,
    'profile': ProfilePage,
    'settings': SettingsPage,
    'freelance': BrowsePage,
    'jobs': BrowsePage,
  };
  const Page = pages[currentPage] || HomePage;
  return <Page />;
}

// ==================== APP ====================
function App() {
  const [configChecked, setConfigChecked] = useState(false);
  const [hasConfig, setHasConfig] = useState(false);

  useEffect(() => {
    const cfg = getStoredConfig();
    setHasConfig(!!cfg);
    setConfigChecked(true);
  }, []);

  const handleReset = () => {
    resetFirebase();
    setHasConfig(false);
  };

  if (!configChecked) return <div className="min-h-screen flex items-center justify-center bg-surface-1 dark:bg-ink-0"><div className="w-8 h-8 border-2 border-brand-500 border-t-transparent rounded-full animate-spin" /></div>;

  if (!hasConfig) return <SetupPage />;

  return (
    <AppProvider>
      <div className="min-h-screen">
        <Navbar />
        <main className="pt-16 lg:pt-18">
          <Router />
        </main>
        <Footer />
        <ToastContainer />
        {/* Firebase status indicator */}
        <button onClick={handleReset} className="fixed bottom-4 right-4 z-40 px-3 py-1.5 bg-ink-0/70 dark:bg-surface-0/70 backdrop-blur-sm text-surface-2 dark:text-ink-3 text-[10px] font-medium rounded-full hover:bg-red-600 hover:text-white transition-colors" title="Click to reset Firebase config">
          Firebase Connected
        </button>
      </div>
    </AppProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
